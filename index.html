<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demand-to-Execution Operating System — Akij Resource</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* Signal Deck palette — obsidian base, cyan/violet/gold, NOT iBOS navy-blue */
    --side-bg-1:#0A0E13;
    --side-bg-2:#141B23;
    --side-border:#232D38;
    --side-text:#8895A3;
    --side-text-dim:#54606D;
    --side-active-bg:#0F3F39;
    --side-active-text:#1FE9C4;
    --side-white:#F1F5F7;
    --icon-bg:#1B242D;

    /* Content (dark obsidian, matches sidebar family) */
    --bg:#0A0E13;
    --card:#141A22;
    --border:#242E3A;
    --border-soft:#1B2430;
    --text-1:#F1F5F7;
    --text-2:#9AA7B5;
    --text-3:#5E6B7A;

    /* Accents */
    --teal:#1FE9C4;
    --teal-dim:#0F3F39;
    --blue:#7C93FF;
    --violet:#B98CFF;
    --violet-bg:#241A3D;
    --amber:#FFB020;
    --amber-bg:#3A2A0E;
    --red:#FF5A5F;
    --red-bg:#3A1518;
    --green:#2FD480;
    --green-bg:#0F3324;
    --grey-bg:#1B2330;

    --font-body:'Inter',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:var(--font-body);
    background:var(--bg);
    color:var(--text-1);
    line-height:1.5;
  }
  button{font-family:inherit; cursor:pointer; background:none; border:none;}
  input{font-family:inherit;}
  a{color:inherit;}

  :focus-visible{ outline:2px solid var(--blue); outline-offset:2px; border-radius:4px; }

  .app{ display:flex; min-height:100vh; }

  /* ================= SIDEBAR ================= */
  .sidebar{
    width:308px;
    flex-shrink:0;
    background:linear-gradient(180deg, var(--side-bg-1), var(--side-bg-2));
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    scrollbar-width:thin;
  }
  .sidebar::-webkit-scrollbar{ width:6px; }
  .sidebar::-webkit-scrollbar-thumb{ background:var(--side-border); border-radius:10px; }

  .sb-brand{
    display:flex; align-items:center; gap:11px;
    padding:22px 20px 18px;
  }
  .sb-brand .mark{
    width:36px;height:36px; border-radius:9px;
    background:linear-gradient(135deg,var(--teal),var(--blue));
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:13px; color:#fff; flex-shrink:0;
  }
  .sb-brand .wordmark{ font-weight:800; font-size:16.5px; color:var(--side-white); letter-spacing:-0.01em; }
  .sb-brand .wordmark span{ color:var(--side-active-text); }
  .sb-brand .tagline{ font-size:9.5px; color:var(--side-text-dim); letter-spacing:0.05em; text-transform:uppercase; margin-top:3px; line-height:1.4; max-width:180px; }

  .sb-search{
    display:flex; align-items:center; gap:9px;
    background:var(--side-white); border-radius:10px;
    padding:11px 13px;
  }
  .sb-search svg{ color:#8993A8; flex-shrink:0; }
  .sb-search input{
    border:none; outline:none; background:none; flex:1;
    font-size:13px; color:var(--text-1);
  }
  .sb-search input::placeholder{ color:#9AA3B5; }

  .sb-search-results{
    position:absolute; left:18px; right:18px; top:calc(100% - 8px);
    background:var(--card); border:1px solid var(--border); border-radius:10px; box-shadow:0 16px 40px rgba(0,0,0,0.5);
    z-index:80; max-height:320px; overflow-y:auto;
  }
  .sb-search-results.hidden{ display:none; }
  .sr-item{ padding:11px 14px; border-bottom:1px solid var(--border-soft); }
  .sr-item:last-child{ border-bottom:none; }
  .sr-item:hover{ background:var(--grey-bg); cursor:pointer; }
  .sr-item .sr-badge{
    font-family:var(--font-mono); font-size:9px; color:var(--teal);
    background:var(--teal-dim); border:1px solid rgba(31,233,196,0.3); padding:1px 6px; border-radius:5px;
  }
  .sr-item .sr-name{ font-size:12.5px; color:var(--text-1); font-weight:600; margin-top:5px; }
  .sr-item .sr-meta{ font-size:11px; color:var(--text-3); margin-top:2px; }
  .sr-empty{ padding:16px 14px; font-size:12.5px; color:var(--text-3); }

  .sb-section-label{
    font-size:10px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--side-text-dim); padding:14px 20px 8px;
  }

  .sb-nav{ padding-bottom:24px; }

  .nav-flat{
    width:100%; display:flex; align-items:center; gap:12px;
    padding:11px 20px; color:var(--side-text);
    font-size:13.5px; font-weight:500; text-align:left;
    transition:background .12s ease, color .12s ease;
  }
  .nav-flat:hover{ background:rgba(255,255,255,0.04); color:var(--side-white); }
  .nav-flat.active{ background:var(--side-active-bg); color:var(--side-active-text); font-weight:700; }
  .nav-flat .nf-icon{ width:20px; height:20px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .nav-flat .nf-badge{
    margin-left:auto; font-family:var(--font-mono); font-size:9.5px;
    background:rgba(255,255,255,0.08); color:var(--side-text); padding:2px 7px; border-radius:20px;
  }
  .nav-flat.active .nf-badge{ background:rgba(31,233,196,0.16); color:var(--side-active-text); }

  .nav-section{ border-bottom:1px solid rgba(255,255,255,0.03); }

  .nav-header{
    width:100%; display:flex; align-items:center; gap:12px;
    padding:12px 20px; color:var(--side-text);
    font-size:13px; font-weight:600; text-align:left;
    transition:background .12s ease, color .12s ease;
  }
  .nav-header:hover{ color:var(--side-white); }
  .nav-header .nh-icon{
    width:26px; height:26px; border-radius:7px; background:var(--icon-bg);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    color:var(--side-text);
  }
  .nav-header.expanded .nh-icon, .nav-header.expanded{ color:var(--side-active-text); }
  .nav-header.expanded .nh-icon{ background:rgba(31,233,196,0.16); color:var(--side-active-text); }
  .nav-header .nh-label{ flex:1; line-height:1.3; }
  .nav-header .nh-chev{
    font-size:11px; color:var(--side-text-dim); transition:transform .18s ease; flex-shrink:0;
  }
  .nav-header.expanded .nh-chev{ transform:rotate(90deg); color:var(--side-active-text); }
  .nav-header .nh-alert-dot{
    width:6px;height:6px;border-radius:50%; background:var(--amber); flex-shrink:0; margin-right:2px;
  }

  .nav-sublist{
    max-height:0; overflow:hidden; transition:max-height .25s ease;
    padding-left:8px;
  }
  .nav-sublist.open{ max-height:600px; padding-bottom:6px; }

  .nav-subitem{
    width:calc(100% - 20px); margin-left:20px;
    display:flex; align-items:center; gap:9px;
    padding:8px 12px 8px 18px; color:var(--side-text-dim);
    font-size:12.5px; text-align:left; border-left:1px solid var(--side-border);
    transition:color .12s ease, border-color .12s ease;
  }
  .nav-subitem:hover{ color:var(--side-white); }
  .nav-subitem .dot{ width:5px;height:5px;border-radius:50%; background:var(--side-text-dim); flex-shrink:0; }
  .nav-subitem.active{ color:#fff; font-weight:700; border-left-color:var(--side-active-text); }
  .nav-subitem.active .dot{ background:var(--side-active-text); }
  .nav-subitem .ns-alert{ width:5px;height:5px;border-radius:50%; background:var(--amber); margin-left:auto; flex-shrink:0; }

  /* ================= MAIN ================= */
  .main{ flex:1; min-width:0; display:flex; flex-direction:column; }

  .topheader{
    position:sticky; top:0; z-index:30;
    background:rgba(10,14,19,0.92); backdrop-filter:blur(14px); border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    padding:16px clamp(20px,3vw,40px);
  }
  .th-meta{ display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
  .th-meta .item{ font-size:12.5px; color:var(--text-2); }
  .th-meta .item b{ color:var(--text-1); font-weight:700; }
  .th-meta .divider{ width:1px; height:14px; background:var(--border); }
  .th-meta .link{ color:var(--teal); font-weight:600; font-size:12.5px; }
  .th-clock{
    font-family:var(--font-mono); font-size:12px; color:var(--text-3);
    display:flex; align-items:center; gap:7px;
  }
  .th-clock .dot{ width:6px;height:6px;border-radius:50%; background:var(--green); box-shadow:0 0 0 3px rgba(31,169,113,0.18); }

  .accent-bar{ height:3px; background:linear-gradient(90deg, var(--teal), var(--blue)); }

  .content{
    flex:1; padding:30px clamp(20px,3vw,40px) 60px;
    max-width:1240px; width:100%;
  }

  .content-title{ margin-bottom:22px; }
  .content-title h2{ font-size:23px; font-weight:800; letter-spacing:-0.01em; }
  .content-title .sub{ font-size:13px; color:var(--text-3); margin-top:5px; }

  .hero-block{ margin-bottom:32px; padding-bottom:28px; border-bottom:1px solid var(--border-soft); }
  .hero-eyebrow{
    font-family:var(--font-mono); font-size:11.5px; letter-spacing:0.18em; text-transform:uppercase;
    color:var(--amber); margin-bottom:16px; display:block; font-weight:600;
  }
  .hero-block h1{
    font-size:clamp(28px,3.6vw,42px); font-weight:800; line-height:1.1; letter-spacing:-0.02em;
    max-width:820px; color:var(--text-1);
  }
  .hero-block h1 em{
    font-style:normal;
    background:linear-gradient(90deg, var(--teal), var(--violet));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .hero-block p{ margin-top:16px; max-width:640px; color:var(--text-2); font-size:14.5px; line-height:1.65; }

  /* Stat strip */
  .stat-strip{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:14px; margin-bottom:26px;
  }
  .stat-cell{ background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 20px; }
  .stat-cell .num{ font-size:26px; font-weight:800; color:var(--text-1); display:flex; align-items:baseline; gap:4px; }
  .stat-cell .num small{ font-family:var(--font-mono); font-size:12px; color:var(--text-3); font-weight:500; }
  .stat-cell .lbl{ margin-top:4px; font-size:11.5px; color:var(--text-3); }
  .stat-cell.accent .num{ color:var(--amber); }
  .stat-cell.accent2 .num{ color:var(--blue); }

  /* Output box */
  .panel-head{
    display:flex; flex-wrap:wrap; gap:20px; justify-content:space-between; align-items:flex-start;
    margin-bottom:22px;
  }
  .ph-right{ display:flex; gap:14px; flex-wrap:wrap; align-items:flex-start; }
  .output-box{
    background:var(--card); border:1px solid var(--border); border-left:3px solid var(--teal);
    border-radius:10px; padding:16px 18px; max-width:400px; width:100%;
  }
  .output-box .ob-label{
    font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--teal); margin-bottom:10px; font-weight:700;
  }
  .output-box ul{ list-style:none; display:flex; flex-direction:column; gap:10px; }
  .output-box li{
    font-size:13px; color:var(--text-2); padding-left:14px; position:relative;
    display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .output-box li::before{ content:"→"; position:absolute; left:0; color:var(--teal); }
  .output-box li .oline-text{ flex:1; min-width:140px; }

  .bu-select-box{
    background:var(--card); border:1px solid var(--border); border-left:3px solid var(--violet);
    border-radius:10px; padding:16px 18px; width:220px; position:relative; flex-shrink:0;
  }
  .bu-select-box .ob-label{
    font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--violet); margin-bottom:10px; font-weight:700;
  }
  .ttc-ttd-note{
    margin-top:12px; font-size:10.5px; color:var(--red); font-weight:600; line-height:1.5;
  }
  @media (max-width:640px){ .bu-select-box{ width:100%; } }

  /* Status badge */
  .status-badge{
    font-family:var(--font-mono); font-size:10px; letter-spacing:0.03em;
    padding:5px 11px; border-radius:100px; border:1px solid var(--border);
    background:var(--grey-bg); color:var(--text-3); white-space:nowrap;
    transition:all .15s ease; text-transform:uppercase; font-weight:600;
  }
  .status-badge:hover{ filter:brightness(1.15); transform:translateY(-1px); }
  .status-badge[data-status="met"]{ background:var(--green-bg); color:var(--green); border-color:rgba(47,212,128,0.35); }
  .status-badge[data-status="atrisk"]{ background:var(--amber-bg); color:var(--amber); border-color:rgba(255,176,32,0.35); }
  .status-badge[data-status="notmet"]{ background:var(--red-bg); color:var(--red); border-color:rgba(255,90,95,0.35); }
  .status-badge[data-status="unassessed"]{ background:var(--grey-bg); color:var(--text-3); border-color:var(--border); }

  .status-hint{ font-family:var(--font-mono); font-size:10.5px; color:var(--text-3); margin-top:14px; }

  /* Sub-activity grid */
  .subgrid{
    display:flex; flex-direction:column; background:var(--card);
    border:1px solid var(--border); border-radius:12px; overflow:hidden;
  }
  .subgrid-header{
    display:grid; grid-template-columns:34px 1.5fr 90px 90px 1.3fr 150px; gap:14px; padding:11px 20px;
    background:var(--grey-bg); font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--text-3); font-weight:700; border-bottom:1px solid var(--border);
  }
  .subrow{
    display:grid; grid-template-columns:34px 1.5fr 90px 90px 1.3fr 150px; gap:14px; padding:15px 20px;
    align-items:center; border-bottom:1px solid var(--border-soft); transition:background .15s ease;
  }
  .subrow:last-child{ border-bottom:none; }
  .subrow:hover{ background:var(--grey-bg); }
  .subrow.flash{ animation:row-flash 1.6s ease; }
  @keyframes row-flash{ 0%{ background:rgba(31,233,196,0.16); } 100%{ background:transparent; } }

  @media (max-width:820px){
    .subgrid-header{ display:none; }
    .subrow{ grid-template-columns:1fr; gap:8px; padding:16px 18px; }
  }

  .row-idx{ font-family:var(--font-mono); font-size:11px; color:var(--text-3); }
  .row-name{ font-size:13.5px; font-weight:600; color:var(--text-1); }

  .tag{
    display:inline-flex; align-items:center; font-family:var(--font-mono); font-size:10px;
    letter-spacing:0.03em; padding:4px 9px; border-radius:6px; width:fit-content; font-weight:600;
  }
  .tag.ttd{ background:rgba(124,147,255,0.12); color:var(--blue); border:1px solid rgba(124,147,255,0.3); }
  .tag.ttc{ background:var(--grey-bg); color:var(--text-2); border:1px solid var(--border); }

  .alert-flag{ display:flex; align-items:center; gap:7px; font-family:var(--font-mono); font-size:10.5px; font-weight:600; }
  .lamp{ width:8px;height:8px;border-radius:50%; flex-shrink:0; }
  .lamp.on{ background:var(--red); box-shadow:0 0 0 3px rgba(255,90,95,0.22); }
  .lamp.off{ background:#333F4C; }
  .alert-flag.on{ color:var(--red); }
  .alert-flag.off{ color:var(--text-3); }

  .kpi-cell{ font-size:12px; color:var(--text-2); line-height:1.5; }
  .kpi-cell .kpi-badge{
    display:inline-block; font-size:9.5px; text-transform:uppercase; letter-spacing:0.04em;
    color:var(--violet); background:var(--violet-bg); border:1px solid rgba(185,140,255,0.35);
    padding:1px 7px; border-radius:5px; margin-bottom:5px; font-weight:700;
  }
  @media (max-width:820px){ .row-idx{ display:none; } }

  .tower-link{
    display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:600;
    padding:5px 10px; border-radius:7px; text-decoration:none; width:fit-content;
    background:var(--teal-dim); color:var(--teal); border:1px solid rgba(31,233,196,0.35);
    transition:background .12s ease, transform .12s ease;
  }
  .tower-link:hover{ background:rgba(31,233,196,0.22); transform:translateY(-1px); }
  .tower-link .pulse{ width:6px; height:6px; border-radius:50%; background:var(--teal); flex-shrink:0;
    box-shadow:0 0 0 0 rgba(31,233,196,0.6); animation:tower-pulse 1.8s infinite; }
  @keyframes tower-pulse{ 0%{box-shadow:0 0 0 0 rgba(31,233,196,0.55);} 70%{box-shadow:0 0 0 6px rgba(31,233,196,0);} 100%{box-shadow:0 0 0 0 rgba(31,233,196,0);} }
  .tower-link.off{
    color:var(--text-3); background:none; border:1px dashed var(--border); font-weight:500; cursor:default;
  }
  .tower-link.off:hover{ transform:none; }

  /* Full picture master table */
  .fp-controls{ display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:18px; }
  .fp-search{
    display:flex; align-items:center; gap:8px;
    background:var(--card); border:1px solid var(--border); border-radius:8px;
    padding:9px 12px; min-width:260px; flex:1; max-width:360px;
  }
  .fp-search svg{ color:var(--text-3); flex-shrink:0; }
  .fp-search input{
    border:none; outline:none; background:none; flex:1;
    font-size:12.5px; color:var(--text-1);
  }
  .fp-search input::placeholder{ color:var(--text-3); }
  .fp-select{
    background:var(--card); border:1px solid var(--border); color:var(--text-2);
    font-size:12.5px; padding:9px 12px; border-radius:8px;
  }
  .fp-count{ font-family:var(--font-mono); font-size:11px; color:var(--text-3); margin-left:auto; }

  .master-table{ background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .mt-header{
    display:grid; grid-template-columns:30px 1fr 1.3fr 80px 80px 1.3fr 140px; gap:12px; padding:11px 18px;
    background:var(--grey-bg); font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--text-3); font-weight:700; border-bottom:1px solid var(--border);
  }
  .mt-row{
    display:grid; grid-template-columns:30px 1fr 1.3fr 80px 80px 1.3fr 140px; gap:12px; padding:13px 18px;
    align-items:center; font-size:12.5px; border-bottom:1px solid var(--border-soft);
  }
  .mt-row:last-child{ border-bottom:none; }
  .mt-row:hover{ background:var(--grey-bg); cursor:pointer; }
  .mt-activity{ font-family:var(--font-mono); font-size:10.5px; color:var(--blue); font-weight:600; }
  @media (max-width:900px){
    .mt-header{ display:none; }
    .mt-row{ grid-template-columns:1fr; gap:6px; }
  }

  /* ---------- Insights dashboard ---------- */
  .kpi-tile-row{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:24px; }
  .kpi-tile{
    background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px 22px;
    display:flex; flex-direction:column; gap:10px; position:relative; overflow:hidden;
  }
  .kpi-tile .kt-icon{
    width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center;
  }
  .kpi-tile .kt-num{ font-size:30px; font-weight:800; color:var(--text-1); font-family:var(--font-mono); }
  .kpi-tile .kt-label{ font-size:11.5px; color:var(--text-3); }

  .insights-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(270px,1fr)); gap:16px; margin-bottom:20px; }
  .donut-card{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding:22px; }
  .donut-card h4{ font-size:13.5px; font-weight:800; color:var(--text-1); margin-bottom:16px; }
  .donut-body{ display:flex; align-items:center; gap:18px; }
  .donut-svg-wrap{ position:relative; flex-shrink:0; }
  .donut-center{
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .donut-center .dc-big{ font-family:var(--font-mono); font-size:22px; font-weight:800; color:var(--text-1); line-height:1; }
  .donut-center .dc-small{ font-size:9.5px; color:var(--text-3); margin-top:3px; text-align:center; }
  .donut-legend{ display:flex; flex-direction:column; gap:9px; flex:1; min-width:0; }
  .dl-item{ display:flex; align-items:center; gap:8px; font-size:11.5px; color:var(--text-2); }
  .dl-item .dl-dot{ width:9px; height:9px; border-radius:3px; flex-shrink:0; }
  .dl-item .dl-val{ margin-left:auto; font-family:var(--font-mono); font-weight:700; color:var(--text-1); }

  .barchart-card{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding:24px; margin-bottom:20px; }
  .barchart-card h4{ font-size:13.5px; font-weight:800; color:var(--text-1); margin-bottom:18px; }
  .bar-row{ display:flex; align-items:center; gap:12px; padding:8px 0; }
  .bar-label{ width:220px; flex-shrink:0; font-size:12px; color:var(--text-2); }
  .bar-track{ flex:1; height:12px; background:var(--grey-bg); border-radius:20px; overflow:hidden; }
  .bar-fill{ height:100%; border-radius:20px; }
  .bar-value{ width:28px; text-align:right; font-family:var(--font-mono); font-size:12px; color:var(--text-1); font-weight:700; flex-shrink:0; }

  .bottleneck-panel{ background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
  .bottleneck-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 22px; border-bottom:1px solid var(--border-soft);
  }
  .bottleneck-head h4{ font-size:14px; font-weight:800; color:var(--text-1); }
  .bottleneck-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:1px; background:var(--border-soft); }
  .bc-card{
    background:linear-gradient(135deg, rgba(255,90,95,0.06), var(--card) 55%);
    padding:16px 20px; display:flex; gap:12px; align-items:flex-start;
  }
  .bc-card .bc-icon{
    width:28px; height:28px; border-radius:8px; background:var(--red-bg); color:var(--red);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .bc-card .bc-title{ font-size:13px; font-weight:700; color:var(--text-1); }
  .bc-card .bc-meta{ font-size:10.5px; color:var(--text-3); margin-top:3px; font-family:var(--font-mono); }
  .bc-card .bc-trigger{ font-size:11.5px; color:var(--text-2); margin-top:7px; line-height:1.5; }
  .bc-card .sev{ margin-top:6px; }

  /* ---------- Insights dashboard end ---------- */

  /* Alerts table */
  .alert-table{ background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .at-header{
    display:grid; grid-template-columns:1.1fr 1.4fr 90px 2fr 130px; gap:16px; padding:11px 20px;
    background:var(--grey-bg); font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--text-3); font-weight:700; border-bottom:1px solid var(--border);
  }
  .at-row{
    display:grid; grid-template-columns:1.1fr 1.4fr 90px 2fr 130px; gap:16px; padding:15px 20px;
    align-items:center; border-bottom:1px solid var(--border-soft);
  }
  .at-row:last-child{ border-bottom:none; }
  .at-row:hover{ background:var(--grey-bg); }
  @media (max-width:900px){
    .at-header{ display:none; }
    .at-row{ grid-template-columns:1fr; gap:8px; }
  }
  .sev{
    font-family:var(--font-mono); font-size:9.5px; padding:4px 9px; border-radius:6px; width:fit-content;
    text-transform:uppercase; letter-spacing:0.03em; font-weight:700;
  }
  .sev.critical{ background:var(--red-bg); color:var(--red); border:1px solid rgba(255,90,95,0.35); }
  .sev.warning{ background:var(--amber-bg); color:var(--amber); border:1px solid rgba(255,176,32,0.35); }
  .at-rule{ font-size:12px; color:var(--text-2); line-height:1.5; }

  /* SBU-wise MAPE breakdown (live pull from Control Tower) */
  .mape-details{ grid-column:1 / -1; margin-top:10px; }
  .mape-details summary{
    cursor:pointer; list-style:none; display:inline-flex; align-items:center; gap:7px;
    font-family:var(--font-mono); font-size:10.5px; font-weight:600; color:var(--teal);
    background:var(--teal-dim); border:1px solid rgba(31,233,196,0.3); border-radius:6px;
    padding:5px 10px; width:fit-content;
  }
  .mape-details summary::-webkit-details-marker{ display:none; }
  .mape-details[open] summary{ margin-bottom:10px; }
  .mape-table{ width:100%; border-collapse:collapse; background:var(--grey-bg); border-radius:8px; overflow:hidden; }
  .mape-table th{
    text-align:left; font-family:var(--font-mono); font-size:9.5px; text-transform:uppercase; letter-spacing:0.05em;
    color:var(--text-3); padding:8px 12px; border-bottom:1px solid var(--border);
  }
  .mape-table td{ padding:8px 12px; font-size:12px; color:var(--text-2); border-bottom:1px solid var(--border-soft); }
  .mape-table tr:last-child td{ border-bottom:none; }
  .mape-table .mv{ font-family:var(--font-mono); font-weight:600; }
  .mape-status{
    font-family:var(--font-mono); font-size:9px; padding:2px 8px; border-radius:5px; text-transform:uppercase;
    font-weight:700; letter-spacing:0.03em;
  }
  .mape-status.breach{ background:var(--red-bg); color:var(--red); }
  .mape-status.ok{ background:var(--green-bg); color:var(--green); }
  .mape-status.nodata{ background:var(--grey-bg); color:var(--text-3); border:1px solid var(--border); }

  .ppa-slice-toggle{ display:flex; gap:6px; margin-bottom:10px; }
  .ppa-slice-btn{
    font-family:var(--font-mono); font-size:10.5px; font-weight:600; padding:5px 12px; border-radius:6px;
    background:var(--grey-bg); color:var(--text-2); border:1px solid var(--border);
  }
  .ppa-slice-btn.active{ background:var(--teal-dim); color:var(--teal); border-color:rgba(31,233,196,0.4); }

  .ppa-num-label{ font-size:9.5px; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-3); }
  .ppa-num{ font-family:var(--font-mono); font-size:16px; font-weight:700; color:var(--text-1); }

  @keyframes gap-blink{ 0%,100%{ opacity:1; } 50%{ opacity:0.25; } }
  .gap-beep{ color:var(--red); font-weight:700; animation:gap-blink 1s infinite; }

  /* Overview */
  .overview-grid{ display:grid; grid-template-columns:1.3fr 1fr; gap:18px; }
  @media (max-width:960px){ .overview-grid{ grid-template-columns:1fr; } }

  .flow-card, .notes-card, .osb-card{ background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px; }
  .flow-card h3, .notes-card h3, .osb-card h3{ font-size:14.5px; font-weight:800; margin-bottom:16px; color:var(--text-1); }

  .flow-steps{ display:flex; flex-direction:column; }
  .flow-step{ display:flex; gap:14px; padding:12px 0; border-bottom:1px solid var(--border-soft); }
  .flow-step:last-child{ border-bottom:none; }
  .flow-step .fn{ font-family:var(--font-mono); font-size:11px; color:var(--teal); width:20px; flex-shrink:0; padding-top:2px; font-weight:700; }
  .flow-step .fc h4{ font-size:13px; font-weight:700; color:var(--text-1); }
  .flow-step .fc p{ font-size:11.5px; color:var(--text-3); margin-top:3px; }
  .flow-step .fstats{ margin-left:auto; display:flex; gap:14px; align-items:center; flex-shrink:0; }
  .flow-step .fstats .fnum{ font-family:var(--font-mono); font-size:12px; color:var(--text-2); text-align:right; font-weight:600; }
  .flow-step .fstats .fnum small{ color:var(--text-3); display:block; font-size:9px; font-weight:400; }

  .notes-card{ border-left:3px solid var(--violet); background:linear-gradient(180deg, var(--violet-bg) 0%, var(--card) 40%); }
  .notes-card .badge-claude{
    display:inline-flex; align-items:center; gap:6px; font-family:var(--font-mono); font-size:9.5px;
    letter-spacing:0.06em; text-transform:uppercase; color:var(--violet); background:rgba(185,140,255,0.14);
    border:1px solid rgba(185,140,255,0.35); padding:3px 9px; border-radius:100px; margin-bottom:14px; font-weight:700;
  }
  .notes-list{ display:flex; flex-direction:column; gap:14px; }
  .note-item{ display:flex; gap:11px; }
  .note-item .n-mark{ font-family:var(--font-mono); font-size:11px; color:var(--violet); padding-top:1px; flex-shrink:0; font-weight:700; }
  .note-item p{ font-size:12.5px; color:var(--text-2); line-height:1.6; }
  .note-item p strong{ color:var(--text-1); font-weight:700; }

  .osb-card{ grid-column:1 / -1; margin-top:4px; }
  .osb-table{ border:1px solid var(--border-soft); border-radius:10px; overflow:hidden; }
  .osb-header{
    display:grid; grid-template-columns:1fr 1.8fr 150px; gap:14px; padding:10px 16px;
    background:var(--grey-bg); font-size:10px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--text-3); font-weight:700; border-bottom:1px solid var(--border);
  }
  .osb-row{
    display:grid; grid-template-columns:1fr 1.8fr 150px; gap:14px; padding:13px 16px;
    align-items:center; font-size:12.5px; border-bottom:1px solid var(--border-soft);
  }
  .osb-row:last-child{ border-bottom:none; }
  @media (max-width:760px){
    .osb-header{ display:none; }
    .osb-row{ grid-template-columns:1fr; gap:6px; }
  }

  .footer-note{
    margin-top:40px; padding-top:20px; border-top:1px solid var(--border);
    font-size:11.5px; color:var(--text-3); line-height:1.7;
  }
  .legend{ display:flex; gap:20px; flex-wrap:wrap; margin-top:14px; }
  .legend-item{ display:flex; align-items:center; gap:7px; font-family:var(--font-mono); font-size:10.5px; color:var(--text-3); }

  @media (max-width:900px){
    .sidebar{ position:fixed; z-index:100; transform:translateX(-100%); transition:transform .2s ease; }
    .sidebar.open{ transform:translateX(0); }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
  }
  .tower-modal{
    position:fixed; inset:0; z-index:200; background:#000;
    display:none; flex-direction:column;
  }
  .tower-modal.open{ display:flex; }
  .tower-modal-bar{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 18px; background:var(--card); border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .tower-modal-label{ font-size:13px; font-weight:600; color:var(--text-1); display:flex; align-items:center; }

  }

function cycleStatus(key, store, cycle){
  const idx = cycle.indexOf(store[key]);
  store[key] = cycle[(idx+1) % cycle.length];
  return store[key];
}

            ${s.alert?'<span class="ns-alert"></span>':''}

        `).join('')}

  el.querySelectorAll('.nav-header').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.activity;
      const collapsing = state.expandedActivity === id;
      if(collapsing){
        state.expandedActivity = null;
        renderSidebarActivities();
      } else {
        state.expandedActivity = id;
        state.activeSubName = null;
        goto(id);

    });

  el.querySelectorAll('.nav-subitem').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      const id = btn.dataset.activity;
      const subname = decodeURIComponent(btn.dataset.sub);
      state.expandedActivity = id;
      state.activeSubName = subname;
      goto(id, subname);
    });
  });
}

function drpRecommendedAction(zone, rootCause){
  if(zone==='Green') return 'None — within SLA';
  if(rootCause==='Supply Chain') return 'Expedite replenishment to this depot / reallocate from another';
  if(rootCause==='Sales Team') return 'Escalate to Sales — stock available at depot, lift now';
  if(rootCause==='Shared Responsibility') return 'Sales to re-confirm with customer — depot stock now available';
  return zone==='Yellow' ? 'Monitor — approaching SLA breach' : 'Review';
}

function getCheckedValues(groupName){
  return Array.from(document.querySelectorAll(`input[data-msdd-option="${groupName}"]:checked`)).map(el=>el.value);
}

function drpUpdateDropdownLabel(groupName, niceName){
  const checked = getCheckedValues(groupName);
  const label = document.getElementById(`drp-${groupName}-label`);
  if(!label) return;
  if(checked.length===0) label.textContent = `${niceName}: All`;
  else if(checked.length===1) label.textContent = `${niceName}: ${checked[0]}`;
  else label.textContent = `${niceName}: ${checked.length} selected`;
}

function drpRenderTable(){
  const searchEl = document.getElementById('drp-search');
  const zoneEl = document.getElementById('drp-zone-filter');
  const tbody = document.getElementById('drp-table-body');
  const countLabel = document.getElementById('drp-count-label');
  if(!tbody) return;
  const search = (searchEl && searchEl.value || '').toLowerCase();
  const zoneFilter = zoneEl ? zoneEl.value : 'ALL';
  const channelFilter = getCheckedValues('channel');
  const shippointFilter = getCheckedValues('shippoint');
  drpUpdateDropdownLabel('channel', 'Channel');
  drpUpdateDropdownLabel('shippoint', 'Ship Point');

  let rows = DRP_DETAIL;
  if(zoneFilter !== 'ALL') rows = rows.filter(r=>r[11]===zoneFilter);
  if(channelFilter.length) rows = rows.filter(r=>channelFilter.includes(r[4]));
  if(shippointFilter.length) rows = rows.filter(r=>shippointFilter.includes(r[3]));
  if(search) rows = rows.filter(r=> r[0].toLowerCase().includes(search) || r[1].toLowerCase().includes(search) || r[2].toLowerCase().includes(search));

  // ---- Recompute Executive KPIs live from the filtered rows ----
  const distinctSO = new Set(rows.map(r=>r[0]));
  const rank = {Green:0, Yellow:1, Red:2};
  const soWorstZone = {};
  rows.forEach(r=>{
    const so = r[0], z = r[11];
    if(!(so in soWorstZone) || rank[z] > rank[soWorstZone[so]]) soWorstZone[so] = z;
  });
  const zonesSO = {Green:0, Yellow:0, Red:0};
  Object.values(soWorstZone).forEach(z=>zonesSO[z]++);
  const zonesLine = {Green:0, Yellow:0, Red:0};
  let pendingQtySum = 0, pendingValueSum = 0;
  rows.forEach(r=>{ zonesLine[r[11]]++; pendingQtySum += r[5]; pendingValueSum += r[6]; });
  const totalSO = distinctSO.size, totalLine = rows.length;
  const otifSO = totalSO ? (zonesSO.Green/totalSO*100) : 0;
  const otifLine = totalLine ? (zonesLine.Green/totalLine*100) : 0;

  const setKpi = (id, val, color) => {
    const el = document.getElementById(`drp-kpi-${id}`);
    if(el){ el.textContent = val; if(color) el.style.color = color; }
  };
  setKpi('totalso', totalSO.toLocaleString());
  setKpi('greenso', zonesSO.Green.toLocaleString());
  setKpi('yellowso', zonesSO.Yellow.toLocaleString());
  setKpi('redso', zonesSO.Red.toLocaleString());
  setKpi('otifso', otifSO.toFixed(1)+'%', otifSO<70?'var(--red)':'var(--green)');
  setKpi('totalline', totalLine.toLocaleString());
  setKpi('greenline', zonesLine.Green.toLocaleString());
  setKpi('yellowline', zonesLine.Yellow.toLocaleString());
  setKpi('redline', zonesLine.Red.toLocaleString());
  setKpi('otifline', otifLine.toFixed(1)+'%', otifLine<70?'var(--red)':'var(--green)');
  setKpi('pendingqty', pendingQtySum.toLocaleString(undefined,{maximumFractionDigits:0}));
  setKpi('pendingvalue', (pendingValueSum/1e6).toFixed(1)+'M');

  const anyFilterActive = zoneFilter!=='ALL' || channelFilter.length>0 || shippointFilter.length>0 || search;
  const headerSO = document.getElementById('drp-kpi-header-so');
  const headerLine = document.getElementById('drp-kpi-header-line');
  if(headerSO) headerSO.textContent = `Executive KPIs — by Sales Order (${totalSO.toLocaleString()} distinct SOs${anyFilterActive?', filtered':''})`;
  if(headerLine) headerLine.textContent = `Executive KPIs — by Line Item (${totalLine.toLocaleString()} SO+SKU rows${anyFilterActive?', filtered':''})`;
  const filterNote = document.getElementById('drp-kpi-filter-note');
  if(filterNote) filterNote.textContent = anyFilterActive ? '⚡ KPIs above reflect your current filter selection, not the full dataset.' : '';

  // ---- Recompute Critical Red Zone Items live from the filtered rows ----
  // (previously this table was static/pre-computed and never responded to the slicers)
  const redRows = rows.filter(r=>r[11]==='Red');
  const bySku = {};
  redRows.forEach(r=>{
    const [,, item,,, pendingQty, pendingValue,,,,,, rootCause] = r;
    if(!bySku[item]) bySku[item] = {pending_qty:0, pending_value:0, red_count:0, sales_team:0, supply_chain:0, shared:0};
    const s = bySku[item];
    s.pending_qty += pendingQty; s.pending_value += pendingValue; s.red_count += 1;
    if(rootCause==='Sales Team') s.sales_team++;
    else if(rootCause==='Supply Chain') s.supply_chain++;
    else if(rootCause==='Shared Responsibility') s.shared++;
  });
  const criticalRanked = Object.entries(bySku).sort((a,b)=>b[1].pending_value - a[1].pending_value);
  const criticalHeader = document.getElementById('drp-critical-header');
  const criticalBody = document.getElementById('drp-critical-body');

  if(criticalHeader) criticalHeader.textContent = `Critical Red Zone Items — ${criticalRanked.length} Unique SKUs, Ranked by Pending Value${anyFilterActive?' (filtered)':''}`;
  if(criticalBody){
    criticalBody.innerHTML = criticalRanked.length ? criticalRanked.map(([sku,c])=>`
      <tr>
        <td>${sku}</td>
        <td class="mv" style="font-weight:700; color:var(--red);">${c.pending_value.toLocaleString()}</td>

    `).join('') : `<tr><td colspan="7" style="text-align:center; color:var(--text-3); padding:16px;">No Red-zone items match the current filter selection.</td></tr>`;
  }
  if(criticalNote){
    if(criticalRanked.length){
      const [topSku, topData] = criticalRanked[0];
      criticalNote.innerHTML = `<strong style="color:var(--text-1);">${topSku} is the single biggest issue${anyFilterActive?' in this selection':''}</strong> — ৳${topData.pending_value.toLocaleString()} pending across ${topData.red_count} Red order${topData.red_count===1?'':'s'} (Sales:${topData.sales_team} SCM:${topData.supply_chain} Shared:${topData.shared}).`;
    } else {
      criticalNote.innerHTML = `No Red-zone items in the current filter selection.`;

  const MAX_RENDER = 300;
  const shown = rows.slice(0, MAX_RENDER);
  countLabel.textContent = `Showing ${shown.length.toLocaleString()} of ${rows.length.toLocaleString()} matching line items` + (rows.length>MAX_RENDER ? ' (narrow your search to see more — rendering is capped for performance)' : '');

  const zoneColor = {Green:'var(--green)', Yellow:'var(--amber)', Red:'var(--red)'};
  const rootCauseColor = {'Sales Team':'var(--amber)','Supply Chain':'var(--red)','Shared Responsibility':'var(--steel,#5B84A6)'};

  tbody.innerHTML = shown.map(r=>{
    const [so, customer, item, shippoint, channel, pendingQty, pendingValue, gapDays, slaDays, slaSource, depotStock, zone, rootCause] = r;

function computeSafetyNorms(it, d){
  const qtyVarDays = ((1-it.sslQty)*it.noq)/it.avg;
  const leadVarDays = (1-d.sslTime)*it.leadDays;
  const overProdDays = (1-d.msa)*15;
  const planVarDays = (1-d.planAcc)*30*d.reactionFlag;
  const safetyDays = qtyVarDays + leadVarDays + overProdDays + planVarDays;
  const minNorm = safetyDays + d.pipelineDays;
  const avgCycleDays = (it.noq/it.avg)/2;
  const maxNorm = minNorm + 2*avgCycleDays;
  return {minNorm, maxNorm, avgCycleDays};
}

function robotBreakdownHTML(r, safetyData){
  if(!r) return '';
  const safetyLookup = {};
  if(safetyData){
    safetyData.items.forEach(it=>{ safetyLookup[it.name] = computeSafetyNorms(it, safetyData.defaults); });
  }
  const rows = r.items.map(it=>{
    const matched = safetyLookup[it.name];
    const usesRealNorm = !!matched;
    const effSafetyDays = usesRealNorm ? matched.minNorm : r.safetyDays;
    const effTargetDays = usesRealNorm ? matched.maxNorm : r.targetDays;
    const safetyQty = effSafetyDays * it.avg;
    const bufferDays = it.dos - effSafetyDays;
    const targetQty = effTargetDays * it.avg;
    const orderQty = Math.max(0, targetQty - it.stock);
    const status = bufferDays < 0 ? 'BREACH' : (bufferDays <= 5 ? 'WATCH' : 'OK');
    const deliverBy = bufferDays < 0 ? 'OVERDUE — order today' : `~${Math.floor(bufferDays)}d (by ${new Date(new Date('2026-07-13').getTime()+Math.floor(bufferDays)*86400000).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'})})`;
    return {...it, safetyQty, bufferDays, orderQty, status, deliverBy, usesRealNorm, effSafetyDays, effTargetDays};
  });
  const actionItems = rows.filter(r=>r.status!=='OK');
  const tableRows = (cat) => rows.filter(x=>x.cat===cat).map(x=>`
    <tr>
      <td>${x.name}${x.usesRealNorm?' <span style="font-size:9px; color:var(--teal);" title="Using Safety Stock Robot\'s material-specific norm instead of the flat rule">●synced</span>':''}</td>
      <td class="mv">${x.stock.toLocaleString()} ${x.unit}</td>
      <td class="mv">${x.avg.toLocaleString()}/d</td>
      <td><span class="mape-status ${x.status==='OK'?'ok':'breach'}">${x.dos.toFixed(1)}d</span></td>
      <td class="mv">${x.safetyQty.toLocaleString(undefined,{maximumFractionDigits:0})} <span style="font-size:9px; color:var(--text-3);">(${x.effSafetyDays.toFixed(1)}d${x.usesRealNorm?' real':' flat'})</span></td>
      <td>${x.status==='BREACH' ? `<span class="gap-beep">BREACH</span>` : x.status==='WATCH' ? `<span style="color:var(--amber); font-weight:700;">WATCH</span>` : `<span style="color:var(--green); font-weight:700;">OK</span>`}</td>
      <td class="mv" style="${x.orderQty>0?'color:var(--red); font-weight:700;':''}">${x.orderQty>0 ? x.orderQty.toLocaleString(undefined,{maximumFractionDigits:0})+' '+x.unit : '—'}</td>
      <td style="font-size:11px;">${x.deliverBy}</td>
    </tr>`).join('');

  const emailBody = actionItems.length ? actionItems.map(x=>
    `${x.name}: order ${x.orderQty.toLocaleString(undefined,{maximumFractionDigits:0})} ${x.unit} — current stock ${x.stock.toLocaleString()} ${x.unit} (${x.dos.toFixed(1)} days cover), ${x.status==='BREACH'?'ALREADY BELOW':'approaching'} the ${x.effSafetyDays.toFixed(1)}-day${x.usesRealNorm?' (material-specific)':' (flat default)'} safety stock threshold. Deliver: ${x.deliverBy}.`
  ).join('\n\n') : 'No items currently below or approaching the safety stock threshold.';
  const mailtoHref = `mailto:affan@akijresource.com?subject=${encodeURIComponent('[TEST] Material Delivery Schedule — ACCL — '+r.asOf)}&body=${encodeURIComponent('Auto-generated by D2E Material Planning Robot. As-of: '+r.asOf+'\n\n'+emailBody)}`;

  return `
    <details class="mape-details" style="margin-top:14px;" open>
      <summary>🤖 Material Planning Robot — PM &amp; RM Delivery Schedule (ACCL) ▾</summary>
      <div style="background:var(--card); border:1px solid rgba(47,212,128,0.4); border-radius:8px; padding:10px 12px; margin-bottom:10px; font-size:12px; color:var(--text-2); line-height:1.5;">
        <strong style="color:var(--green);">✓ All 5 Raw Materials updated 15-Jul-26 — live closing stock from IBOS.</strong> Fixed by matching the ledger on the stable <code>intItemId</code> instead of item name (several materials were split across cosmetic name variants, undercounting receipts) — cross-checked against a live IBOS report you shared, exact match on Clinker (58,062.57 MT). Avg consumption now reflects real MTD Jul 1–15 usage. <strong style="color:var(--amber);">Packaging (PM) materials below are still as of 1-Apr-26</strong> — that closing-stock report only covered Raw Materials; share an equivalent one for PM and I'll refresh those too.
      </div>
      <div class="ppa-summary" style="margin-bottom:12px;">
        <div class="ppa-summary-label">As of ${r.asOf} · Threshold: material-specific from the Safety Stock Robot where matched (marked ●synced), else a flat ${r.safetyDays}d safety / ${r.targetDays}d target fallback</div>
        <div class="ppa-summary-nums">
          <div><span class="ppa-num-label">Items Tracked</span><span class="ppa-num">${rows.length}</span></div>
          <div><span class="ppa-num-label">Breach</span><span class="ppa-num" style="color:var(--red);">${rows.filter(x=>x.status==='BREACH').length}</span></div>

        <div style="font-size:12px; color:var(--text-3); margin-bottom:10px; line-height:1.5;">${actionItems.length} item(s) need action. Review before sending — clicking Send fires a real email immediately via Gmail (through Apps Script), it is not a draft. You'll get a confirmation prompt first.</div>
        <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
          <button type="button" class="tower-link" data-send-real-email="1"
            data-send-to="affan@akijresource.com,csco.arl@akijresource.com,ashikur.ael@akijresource.com"
            data-send-subject="${encodeURIComponent('Material Delivery Schedule — ACCL — '+r.asOf)}"

          <strong style="color:var(--green);">Fixed: this robot now uses the Safety Stock Robot's material-specific Min/Max Norm</strong> wherever a match exists (marked ●synced in the table), instead of a flat 15-day/30-day rule for everything. This was flagged directly — Empty Cement Bag-PCC(Stitch) was showing BREACH here (13.9 days vs a flat 15-day line) while the Safety Stock Robot correctly showed WITHIN RANGE (its real 19-day lead time and large order cycle put its actual safe range at 8.1–23.1 days). Both robots now agree, since they use the same underlying formula for any material both track.<br><br>
          <strong style="color:var(--text-1);">What this build does today:</strong> pulls the latest Opening Stock and Avg Daily Consumption per material, computes Days of Supply, and flags anything outside the applicable threshold (real per-material norm where available, flat 15/30-day fallback otherwise), sizing a suggested order back up to the target level.<br><br>

// ---- Embedded Control Tower (base64, self-contained — no external file needed) ----
// D2E SBU names → Control Tower SBU ids (only genuine matches mapped; others open tower default)
const TOWER_SBU_MAP = {
  'ACCL':'cement', 'AIL':'ispat', 'AAFL':'agro',
  'AEL-Rice Plant':'essentials', 'AEL-AMS & Daal':'essentials',
};
// Towers are gzip-compressed before base64 encoding (data-gzip="1" flags this) to keep
// the published file size down. DecompressionStream is native to modern browsers
// (Chrome/Edge 80+, Firefox 113+, Safari 16.4+) -- no external library needed.
// ============================================================
// Real email sending via Google Apps Script (D2E_Email_Sender.gs).
// text/plain content-type deliberately avoids triggering a CORS preflight
// (Apps Script Web Apps don't handle OPTIONS requests, so a JSON
// content-type would fail before the request even reaches doPost).
// ============================================================
async function sendRealEmail(to, subject, body, buttonEl, statusEl){
  if(!EMAIL_ENDPOINT || EMAIL_ENDPOINT.includes('PASTE_YOUR')){
    if(statusEl){
      statusEl.style.display = 'inline';
      statusEl.style.color = 'var(--red)';
      statusEl.textContent = '⚠ Email sending isn\'t set up yet — deploy D2E_Email_Sender.gs and paste its URL into EMAIL_ENDPOINT in this file.';
    }
    return;
  }
  const confirmed = confirm(`Send this email now?\n\nTo: ${to}\nSubject: ${subject}\n\nThis sends immediately — it is not a draft.`);
  if(!confirmed) return;

  const originalText = buttonEl ? buttonEl.textContent : '';
  if(buttonEl){ buttonEl.disabled = true; buttonEl.textContent = 'Sending…'; }
  if(statusEl){ statusEl.style.display = 'inline'; statusEl.style.color = 'var(--text-3)'; statusEl.textContent = 'Sending…'; }

  try{
    // Apps Script Web App responses don't include CORS headers, so a normal
    // fetch() gets blocked by the browser before JS can even read the
    // response -- that's the "Failed to fetch" error. mode:'no-cors' lets
    // the request actually go through; the tradeoff is the response comes
    // back "opaque" (status/body unreadable by JS), so success here means
    // "the request was sent without a network error," not a confirmed
    // delivery receipt. Check your inbox or the Apps Script execution log
    // (script.google.com -> this project -> Executions) to confirm it
    // actually sent.
    await fetch(EMAIL_ENDPOINT, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ to, subject, body }),
    });
    if(statusEl){ statusEl.style.color = 'var(--green)'; statusEl.textContent = `✓ Request sent to ${to} — check your inbox (or Apps Script's Executions log) to confirm delivery, since the browser can't read Apps Script's response directly.`; }
  } catch(err){
    if(statusEl){ statusEl.style.color = 'var(--red)'; statusEl.textContent = `✗ Failed to reach the email service: ${err.message}`; }
  } finally {
    if(buttonEl){ buttonEl.disabled = false; buttonEl.textContent = originalText; }
    if(statusEl) setTimeout(()=>{ statusEl.style.display = 'none'; }, 12000);
  }
}

async function decompressB64Gzip(b64){
  const binaryStr = atob(b64);
  const bytes = new Uint8Array(binaryStr.length);
  for(let i=0; i<binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
  if(typeof DecompressionStream === 'undefined'){
    throw new Error('This browser does not support DecompressionStream (needs a browser from ~2023 or later).');
  }
  const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
  const blob = await new Response(stream).blob();
  return await blob.text();
}
async function decodeTowerBlob(elId){
  const el = document.getElementById(elId);
  const b64 = el.textContent;
  return el.dataset.gzip ? await decompressB64Gzip(b64) : atob(b64);
}

  let html = await decodeTowerBlob('tower-b64');

  html = html.replace(/view:\s*'forecast'/, `view:'${viewId}'`);

  if(towerSbu){
    html = html.replace(/sbu:\s*'ispat'/, `sbu:'${towerSbu}'`);
  }
  return html;
}

function donutSVG(segments, size, strokeWidth, centerBig, centerSmall){
  size = size || 128; strokeWidth = strokeWidth || 16;
  const r = (size - strokeWidth) / 2;
  const cx = size / 2, cy = size / 2;
  const circumference = 2 * Math.PI * r;
  const total = segments.reduce((s, x) => s + x.value, 0);
  let cumulative = 0;
  let circles = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${strokeWidth}"/>`;
  if (total > 0) {
    circles += segments.filter(s => s.value > 0).map(seg => {
      const frac = seg.value / total;
      const dash = frac * circumference;
      const gap = circumference - dash;
      const offset = -cumulative * circumference;
      cumulative += frac;
      return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${seg.color}" stroke-width="${strokeWidth}" stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}" transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt"/>`;
    }).join('');
  }
  return `
    <div class="donut-svg-wrap" style="width:${size}px; height:${size}px;">
      <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${circles}</svg>
      <div class="donut-center"><div class="dc-big">${centerBig}</div><div class="dc-small">${centerSmall}</div></div>
    </div>
  `;
}

function donutCard(title, segments, centerBig, centerSmall){
  const svg = donutSVG(segments, 128, 16, centerBig, centerSmall);
  const legend = segments.map(s => `
    <div class="dl-item"><span class="dl-dot" style="background:${s.color}"></span>${s.label}<span class="dl-val">${s.value}</span></div>
  `).join('');
  return `
    <div class="donut-card">
      <h4>${title}</h4>
      <div class="donut-body">
        ${svg}
        <div class="donut-legend">${legend}</div>
      </div>
    </div>
  `;
}

function bindStatusBadges(){
  content.querySelectorAll('.status-badge[data-key]').forEach(btn=>{

// ---- Navigation ----
function goto(id, highlightSub){
  if(id === 'overview'){
    state.view = 'overview'; state.expandedActivity = null; state.activeSubName = null;
    renderOverview();
  } else if(id === 'insights'){
    state.view = 'insights'; state.expandedActivity = null; state.activeSubName = null;
    renderInsights();
  } else if(id === 'critical'){
    state.view = 'critical'; state.expandedActivity = null; state.activeSubName = null;
    renderCriticalSummary();
  } else if(id === 'bots'){
    state.view = 'bots'; state.expandedActivity = null; state.activeSubName = null;
    renderBots();
  } else if(id === 'fullpicture'){
    state.view = 'fullpicture'; state.expandedActivity = null; state.activeSubName = null;
    renderFullPicture('', 'all');
  } else if(id === 'alerts'){
    state.view = 'alerts'; state.expandedActivity = null; state.activeSubName = null;
    renderAlerts();
  } else {
    const a = DATA.find(x=>x.id===id);
    if(!a) return;
    state.view = id;
    state.expandedActivity = id;
    state.activeSubName = highlightSub || state.activeSubName || null;
    renderActivity(a, highlightSub);
  }
  renderSidebar();
  content.scrollTop = 0;
  window.scrollTo({top:0, behavior:'smooth'});
}

content.addEventListener('click', (e)=>{

    const group = toggleBtn.dataset.msddToggle;
    const panel = document.getElementById(`drp-${group}-panel`);

    e.stopPropagation();
  }
  // Select all / Clear buttons inside a dropdown panel
  const allBtn = e.target.closest('[data-msdd-all]');
  if(allBtn){
    const group = allBtn.dataset.msddAll;
    document.querySelectorAll(`input[data-msdd-option="${group}"]`).forEach(cb=>cb.checked=true);

  }
  const noneBtn = e.target.closest('[data-msdd-none]');

    const group = noneBtn.dataset.msddNone;
    document.querySelectorAll(`input[data-msdd-option="${group}"]`).forEach(cb=>cb.checked=false);
    drpRenderTable();
  }
  if(e.target && e.target.id === 'drp-clear-filters'){
    const searchEl = document.getElementById('drp-search');
    const zoneEl = document.getElementById('drp-zone-filter');
    if(searchEl) searchEl.value = '';
    if(zoneEl) zoneEl.value = 'ALL';
    document.querySelectorAll('input[data-msdd-option]').forEach(cb=>cb.checked=false);
    document.querySelectorAll('.drp-msdd-panel').forEach(p=>{ p.style.display='none'; });
    drpRenderTable();
  }
  const sbuItem = e.target.closest('.sr-item[data-sbu]');
  if(sbuItem){
    const sbu = decodeURIComponent(sbuItem.dataset.sbu);
    state.sbu = sbu;
    const buInput = document.getElementById('bu-input');
    if(buInput) buInput.value = sbu;
    const badge = document.getElementById('sbu-badge');
    if(badge) badge.textContent = sbu;
    const buResults = document.getElementById('bu-results');
    if(buResults) buResults.classList.add('hidden');
    document.querySelectorAll('[data-sbu-gate="accl"]').forEach(el=>{
      el.style.display = sbuGateVisible() ? '' : 'none';
    });
    document.querySelectorAll('[data-sbu-gate="notaccl"]').forEach(el=>{
      el.style.display = sbuGateVisible() ? 'none' : '';
    });
    document.querySelectorAll('[data-sbu-gate="essentials"]').forEach(el=>{
      el.style.display = sbuGateVisibleEssentials() ? '' : 'none';
    });
    const noticeName = document.getElementById('sbu-notice-name');
    if(noticeName) noticeName.textContent = sbu;
    return;
  }
  if(e.target.closest('.tower-link')) return;
  const sliceBtn = e.target.closest('.ppa-slice-btn');
  if(sliceBtn){
    const wrap = sliceBtn.closest('.mape-details');
    wrap.querySelectorAll('.ppa-slice-btn').forEach(b=>b.classList.toggle('active', b===sliceBtn));
    wrap.querySelectorAll('[data-ppa-summary]').forEach(el=>{
      el.style.display = (el.dataset.ppaSummary === sliceBtn.dataset.ppaSlice) ? '' : 'none';
    });
    return;
  }
  const capBtn = e.target.closest('.cap-slice-btn');
  if(capBtn){
    const wrap = capBtn.closest('.mape-details');
    wrap.querySelectorAll('.cap-slice-btn').forEach(b=>b.classList.toggle('active', b===capBtn));
    wrap.querySelectorAll('[data-cap-summary]').forEach(el=>{
      el.style.display = (el.dataset.capSummary === capBtn.dataset.capSlice) ? '' : 'none';
    });
    return;
  }
  const stockBtn = e.target.closest('.stock-slice-btn');
  if(stockBtn){
    const wrap = stockBtn.closest('.mape-details');
    wrap.querySelectorAll('.stock-slice-btn').forEach(b=>b.classList.toggle('active', b===stockBtn));
    wrap.querySelectorAll('[data-stock-summary]').forEach(el=>{
      el.style.display = (el.dataset.stockSummary === stockBtn.dataset.stockSlice) ? '' : 'none';
    });
    return;
  }
  const mrpBtn = e.target.closest('.mrp-slice-btn');
  if(mrpBtn){
    const wrap = mrpBtn.closest('.mape-details');
    wrap.querySelectorAll('.mrp-slice-btn').forEach(b=>b.classList.toggle('active', b===mrpBtn));
    wrap.querySelectorAll('[data-mrp-summary]').forEach(el=>{
      el.style.display = (el.dataset.mrpSummary === mrpBtn.dataset.mrpSlice) ? '' : 'none';
    });
    return;
  }
  if(e.target.closest('.mape-details')) return;
  const mtRow = e.target.closest('.mt-row[data-jump]');
  if(mtRow){
    goto(mtRow.dataset.jump, decodeURIComponent(mtRow.dataset.subname));
  }
});
document.addEventListener('click', (e)=>{
  if(!e.target.closest('.bu-select-box')){
    const buResults = document.getElementById('bu-results');
    if(buResults) buResults.classList.add('hidden');
  }
});

// ---- Multi-select dropdown: close on any click outside the dropdown itself ----
// Attached to document (not just `content`) so it also fires for clicks on the
// sidebar, header, or anywhere else on the page -- not just inside the table panel.
document.addEventListener('click', (e)=>{
  if(!e.target.closest('.drp-msdd')){
    document.querySelectorAll('.drp-msdd-panel').forEach(p=>{ p.style.display='none'; });
  }
});

// ---- Clock ----
function tick(){
  const now = new Date();
  document.getElementById('clock-pill').textContent = 'Dhaka ' + now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', hour12:false});
}
tick();
setInterval(tick, 30000);

// ---- Init ----
renderSidebar();
renderOverview();

// ---- Live data refresh (optional — falls back silently to static snapshot) ----
// Looks for data.json next to this file (see refresh_kit/README.md Step 5).
// Currently overrides: the "Last refreshed" banner, and ACCL's RM closing
// stock in the Safety Stock Robot panel. Everything else in the dashboard
// stays as the static build-time figures until wired in a later pass.
async function tryLoadLiveData(){
  try{
    const resp = await fetch('./data.json', {cache:'no-store'});
    if(!resp.ok) return; // no data.json here — stay on static snapshot, no error shown
    const liveData = await resp.json();
    window.LIVE_DATA = liveData;

    const badge = document.getElementById('live-refresh-badge');
    if(liveData.meta && liveData.meta.lastRefreshed){
      const ts = new Date(liveData.meta.lastRefreshed);
      const label = isNaN(ts) ? liveData.meta.lastRefreshed : ts.toLocaleString('en-GB', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
      const errCount = (liveData.meta.errors||[]).length;
      badge.textContent = `Data: live as of ${label}` + (errCount ? ` (${errCount} refresh error${errCount>1?'s':''} — check refresh_log.txt)` : '');
      badge.style.color = errCount ? 'var(--amber)' : 'var(--green)';
    }

    // Override ACCL RM closing stock in the Safety Stock Robot, if present
    if(Array.isArray(liveData.rm_pm_stock)){
      const stockByName = {};
      liveData.rm_pm_stock.forEach(r=>{ if(r.strItemName) stockByName[r.strItemName] = r.current_stock; });
      const mrpActivity = DATA.find(a=>a.id==='mrp');
      if(mrpActivity && mrpActivity.safetyStockRobotData){
        mrpActivity.safetyStockRobotData.items.forEach(item=>{
          if(item.cat==='RM' && stockByName[item.name] !== undefined){
            item.noq = Math.round(stockByName[item.name]);
            item.dos = item.avg>0 ? +(item.noq/item.avg).toFixed(2) : item.dos;
          }
        });
        mrpActivity.safetyStockRobotData.asOf = 'Live (' + (document.getElementById('live-refresh-badge').textContent.replace('Data: live as of ','').split(' (')[0]) + ')';
      }
    }

    // Re-render current view so any open panel picks up the fresh numbers
    if(typeof goto === 'function' && state && state.view) goto(state.view, state.activeSubName);
  } catch(err){
    // fetch() throws on file:// URLs in most browsers (CORS) and on any
    // network hiccup — both are expected/benign here, so stay silent and
    // keep showing the static snapshot rather than surfacing a scary error.
  }
}
tryLoadLiveData();
</script>
