<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demand-to-Execution Operating System — Akij Resource</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* Signal Deck palette — obsidian base, cyan/violet/gold, NOT iBOS navy-blue */
    --side-bg-1:#0A0E13;
    --side-bg-2:#141B23;
    --side-border:#232D38;
    --side-text:#8895A3;
    --side-text-dim:#54606D;
    --side-active-bg:#0F3F39;
    --side-active-text:#1FE9C4;
    --side-white:#F1F5F7;
    --icon-bg:#1B242D;

    /* Content (dark obsidian, matches sidebar family) */
    --bg:#0A0E13;
    --card:#141A22;
    --border:#242E3A;
    --border-soft:#1B2430;
    --text-1:#F1F5F7;
    --text-2:#9AA7B5;
    --text-3:#5E6B7A;

    /* Accents */
    --teal:#1FE9C4;
    --teal-dim:#0F3F39;
    --blue:#7C93FF;
    --violet:#B98CFF;
    --violet-bg:#241A3D;
    --amber:#FFB020;
    --amber-bg:#3A2A0E;
    --red:#FF5A5F;
    --red-bg:#3A1518;
    --green:#2FD480;
    --green-bg:#0F3324;
    --grey-bg:#1B2330;

    --font-body:'Inter',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:var(--font-body);
    background:var(--bg);
    color:var(--text-1);
    line-height:1.5;
  }
  button{font-family:inherit; cursor:pointer; background:none; border:none;}
  input{font-family:inherit;}
  a{color:inherit;}

  :focus-visible{ outline:2px solid var(--blue); outline-offset:2px; border-radius:4px; }

  .app{ display:flex; min-height:100vh; }

  /* ================= SIDEBAR ================= */
  .sidebar{
    width:308px;
    flex-shrink:0;
    background:linear-gradient(180deg, var(--side-bg-1), var(--side-bg-2));
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    scrollbar-width:thin;
  }
  .sidebar::-webkit-scrollbar{ width:6px; }
  .sidebar::-webkit-scrollbar-thumb{ background:var(--side-border); border-radius:10px; }

  .sb-brand{
    display:flex; align-items:center; gap:11px;
    padding:22px 20px 18px;
  }
  .sb-brand .mark{
    width:36px;height:36px; border-radius:9px;
    background:linear-gradient(135deg,var(--teal),var(--blue));
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:13px; color:#fff; flex-shrink:0;
  }
  .sb-brand .wordmark{ font-weight:800; font-size:16.5px; color:var(--side-white); letter-spacing:-0.01em; }
  .sb-brand .wordmark span{ color:var(--side-active-text); }
  .sb-brand .tagline{ font-size:9.5px; color:var(--side-text-dim); letter-spacing:0.05em; text-transform:uppercase; margin-top:3px; line-height:1.4; max-width:180px; }

  .sb-search{
    display:flex; align-items:center; gap:9px;
    background:var(--side-white); border-radius:10px;
    padding:11px 13px;
  }
  .sb-search svg{ color:#8993A8; flex-shrink:0; }
  .sb-search input{
    border:none; outline:none; background:none; flex:1;
    font-size:13px; color:var(--text-1);
  }
  .sb-search input::placeholder{ color:#9AA3B5; }

  .sb-search-results{
    position:absolute; left:18px; right:18px; top:calc(100% - 8px);
    background:var(--card); border:1px solid var(--border); border-radius:10px; box-shadow:0 16px 40px rgba(0,0,0,0.5);
    z-index:80; max-height:320px; overflow-y:auto;
  }
  .sb-search-results.hidden{ display:none; }
  .sr-item{ padding:11px 14px; border-bottom:1px solid var(--border-soft); }
  .sr-item:last-child{ border-bottom:none; }
  .sr-item:hover{ background:var(--grey-bg); cursor:pointer; }
  .sr-item .sr-badge{
    font-family:var(--font-mono); font-size:9px; color:var(--teal);
    background:var(--teal-dim); border:1px solid rgba(31,233,196,0.3); padding:1px 6px; border-radius:5px;
  }
  .sr-item .sr-name{ font-size:12.5px; color:var(--text-1); font-weight:600; margin-top:5px; }
  .sr-item .sr-meta{ font-size:11px; color:var(--text-3); margin-top:2px; }
  .sr-empty{ padding:16px 14px; font-size:12.5px; color:var(--text-3); }

  .sb-section-label{
    font-size:10px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--side-text-dim); padding:14px 20px 8px;
  }

  .sb-nav{ padding-bottom:24px; }

  .nav-flat{
    width:100%; display:flex; align-items:center; gap:12px;
    padding:11px 20px; color:var(--side-text);
    font-size:13.5px; font-weight:500; text-align:left;
    transition:background .12s ease, color .12s ease;
  }
  .nav-flat:hover{ background:rgba(255,255,255,0.04); color:var(--side-white); }
  .nav-flat.active{ background:var(--side-active-bg); color:var(--side-active-text); font-weight:700; }
  .nav-flat .nf-icon{ width:20px; height:20px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .nav-flat .nf-badge{
    margin-left:auto; font-family:var(--font-mono); font-size:9.5px;
    background:rgba(255,255,255,0.08); color:var(--side-text); padding:2px 7px; border-radius:20px;
  }
  .nav-flat.active .nf-badge{ background:rgba(31,233,196,0.16); color:var(--side-active-text); }

  .nav-section{ border-bottom:1px solid rgba(255,255,255,0.03); }

  .nav-header{
    width:100%; display:flex; align-items:center; gap:12px;
    padding:12px 20px; color:var(--side-text);
    font-size:13px; font-weight:600; text-align:left;
    transition:background .12s ease, color .12s ease;
  }
  .nav-header:hover{ color:var(--side-white); }
  .nav-header .nh-icon{
    width:26px; height:26px; border-radius:7px; background:var(--icon-bg);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    color:var(--side-text);
  }
  .nav-header.expanded .nh-icon, .nav-header.expanded{ color:var(--side-active-text); }
  .nav-header.expanded .nh-icon{ background:rgba(31,233,196,0.16); color:var(--side-active-text); }
  .nav-header .nh-label{ flex:1; line-height:1.3; }
  .nav-header .nh-chev{
    font-size:11px; color:var(--side-text-dim); transition:transform .18s ease; flex-shrink:0;
  }
  .nav-header.expanded .nh-chev{ transform:rotate(90deg); color:var(--side-active-text); }
  .nav-header .nh-alert-dot{
    width:6px;height:6px;border-radius:50%; background:var(--amber); flex-shrink:0; margin-right:2px;
  }

  .nav-sublist{
    max-height:0; overflow:hidden; transition:max-height .25s ease;
    padding-left:8px;
  }
  .nav-sublist.open{ max-height:600px; padding-bottom:6px; }

  .nav-subitem{
    width:calc(100% - 20px); margin-left:20px;
    display:flex; align-items:center; gap:9px;
    padding:8px 12px 8px 18px; color:var(--side-text-dim);
    font-size:12.5px; text-align:left; border-left:1px solid var(--side-border);
    transition:color .12s ease, border-color .12s ease;
  }
  .nav-subitem:hover{ color:var(--side-white); }
  .nav-subitem .dot{ width:5px;height:5px;border-radius:50%; background:var(--side-text-dim); flex-shrink:0; }
  .nav-subitem.active{ color:#fff; font-weight:700; border-left-color:var(--side-active-text); }
  .nav-subitem.active .dot{ background:var(--side-active-text); }
  .nav-subitem .ns-alert{ width:5px;height:5px;border-radius:50%; background:var(--amber); margin-left:auto; flex-shrink:0; }

  /* ================= MAIN ================= */
  .main{ flex:1; min-width:0; display:flex; flex-direction:column; }

  .topheader{
    position:sticky; top:0; z-index:30;
    background:rgba(10,14,19,0.92); backdrop-filter:blur(14px); border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    padding:16px clamp(20px,3vw,40px);
  }
  .th-meta{ display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
  .th-meta .item{ font-size:12.5px; color:var(--text-2); }
  .th-meta .item b{ color:var(--text-1); font-weight:700; }
  .th-meta .divider{ width:1px; height:14px; background:var(--border); }
  .th-meta .link{ color:var(--teal); font-weight:600; font-size:12.5px; }
  .th-clock{
    font-family:var(--font-mono); font-size:12px; color:var(--text-3);
    display:flex; align-items:center; gap:7px;
  }
  .th-clock .dot{ width:6px;height:6px;border-radius:50%; background:var(--green); box-shadow:0 0 0 3px rgba(31,169,113,0.18); }

  .accent-bar{ height:3px; background:linear-gradient(90deg, var(--teal), var(--blue)); }

  .content{
    flex:1; padding:30px clamp(20px,3vw,40px) 60px;
    max-width:1240px; width:100%;
  }

  .content-title{ margin-bottom:22px; }
  .content-title h2{ font-size:23px; font-weight:800; letter-spacing:-0.01em; }
  .content-title .sub{ font-size:13px; color:var(--text-3); margin-top:5px; }

  .hero-block{ margin-bottom:32px; padding-bottom:28px; border-bottom:1px solid var(--border-soft); }
  .hero-eyebrow{
    font-family:var(--font-mono); font-size:11.5px; letter-spacing:0.18em; text-transform:uppercase;
    color:var(--amber); margin-bottom:16px; display:block; font-weight:600;
  }
  .hero-block h1{
    font-size:clamp(28px,3.6vw,42px); font-weight:800; line-height:1.1; letter-spacing:-0.02em;
    max-width:820px; color:var(--text-1);
  }
  .hero-block h1 em{
    font-style:normal;
    background:linear-gradient(90deg, var(--teal), var(--violet));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .hero-block p{ margin-top:16px; max-width:640px; color:var(--text-2); font-size:14.5px; line-height:1.65; }

  /* Stat strip */
  .stat-strip{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:14px; margin-bottom:26px;
  }
  .stat-cell{ background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 20px; }
  .stat-cell .num{ font-size:26px; font-weight:800; color:var(--text-1); display:flex; align-items:baseline; gap:4px; }
  .stat-cell .num small{ font-family:var(--font-mono); font-size:12px; color:var(--text-3); font-weight:500; }
  .stat-cell .lbl{ margin-top:4px; font-size:11.5px; color:var(--text-3); }
  .stat-cell.accent .num{ color:var(--amber); }
  .stat-cell.accent2 .num{ color:var(--blue); }

  /* Output box */
  .panel-head{
    display:flex; flex-wrap:wrap; gap:20px; justify-content:space-between; align-items:flex-start;
    margin-bottom:22px;
  }
  .ph-right{ display:flex; gap:14px; flex-wrap:wrap; align-items:flex-start; }
  .output-box{
    background:var(--card); border:1px solid var(--border); border-left:3px solid var(--teal);
    border-radius:10px; padding:16px 18px; max-width:400px; width:100%;
  }
  .output-box .ob-label{
    font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--teal); margin-bottom:10px; font-weight:700;
  }
  .output-box ul{ list-style:none; display:flex; flex-direction:column; gap:10px; }
  .output-box li{
    font-size:13px; color:var(--text-2); padding-left:14px; position:relative;
    display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .output-box li::before{ content:"→"; position:absolute; left:0; color:var(--teal); }
  .output-box li .oline-text{ flex:1; min-width:140px; }

  .bu-select-box{
    background:var(--card); border:1px solid var(--border); border-left:3px solid var(--violet);
    border-radius:10px; padding:16px 18px; width:220px; position:relative; flex-shrink:0;
  }
  .bu-select-box .ob-label{
    font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--violet); margin-bottom:10px; font-weight:700;
  }
  .ttc-ttd-note{
    margin-top:12px; font-size:10.5px; color:var(--red); font-weight:600; line-height:1.5;
  }
  @media (max-width:640px){ .bu-select-box{ width:100%; } }

  /* Status badge */
  .status-badge{
    font-family:var(--font-mono); font-size:10px; letter-spacing:0.03em;
    padding:5px 11px; border-radius:100px; border:1px solid var(--border);
    background:var(--grey-bg); color:var(--text-3); white-space:nowrap;
    transition:all .15s ease; text-transform:uppercase; font-weight:600;
  }
  .status-badge:hover{ filter:brightness(1.15); transform:translateY(-1px); }
  .status-badge[data-status="met"]{ background:var(--green-bg); color:var(--green); border-color:rgba(47,212,128,0.35); }
  .status-badge[data-status="atrisk"]{ background:var(--amber-bg); color:var(--amber); border-color:rgba(255,176,32,0.35); }
  .status-badge[data-status="notmet"]{ background:var(--red-bg); color:var(--red); border-color:rgba(255,90,95,0.35); }
  .status-badge[data-status="unassessed"]{ background:var(--grey-bg); color:var(--text-3); border-color:var(--border); }

  .status-hint{ font-family:var(--font-mono); font-size:10.5px; color:var(--text-3); margin-top:14px; }

  /* Sub-activity grid */
  .subgrid{
    display:flex; flex-direction:column; background:var(--card);
    border:1px solid var(--border); border-radius:12px; overflow:hidden;
  }
  .subgrid-header{
    display:grid; grid-template-columns:34px 1.5fr 90px 90px 1.3fr 150px; gap:14px; padding:11px 20px;
    background:var(--grey-bg); font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--text-3); font-weight:700; border-bottom:1px solid var(--border);
  }
  .subrow{
    display:grid; grid-template-columns:34px 1.5fr 90px 90px 1.3fr 150px; gap:14px; padding:15px 20px;
    align-items:center; border-bottom:1px solid var(--border-soft); transition:background .15s ease;
  }
  .subrow:last-child{ border-bottom:none; }
  .subrow:hover{ background:var(--grey-bg); }
  .subrow.flash{ animation:row-flash 1.6s ease; }
  @keyframes row-flash{ 0%{ background:rgba(31,233,196,0.16); } 100%{ background:transparent; } }

  @media (max-width:820px){
    .subgrid-header{ display:none; }
    .subrow{ grid-template-columns:1fr; gap:8px; padding:16px 18px; }
  }

  .row-idx{ font-family:var(--font-mono); font-size:11px; color:var(--text-3); }
  .row-name{ font-size:13.5px; font-weight:600; color:var(--text-1); }

  .tag{
    display:inline-flex; align-items:center; font-family:var(--font-mono); font-size:10px;
    letter-spacing:0.03em; padding:4px 9px; border-radius:6px; width:fit-content; font-weight:600;
  }
  .tag.ttd{ background:rgba(124,147,255,0.12); color:var(--blue); border:1px solid rgba(124,147,255,0.3); }
  .tag.ttc{ background:var(--grey-bg); color:var(--text-2); border:1px solid var(--border); }

  .alert-flag{ display:flex; align-items:center; gap:7px; font-family:var(--font-mono); font-size:10.5px; font-weight:600; }
  .lamp{ width:8px;height:8px;border-radius:50%; flex-shrink:0; }
  .lamp.on{ background:var(--red); box-shadow:0 0 0 3px rgba(255,90,95,0.22); }
  .lamp.off{ background:#333F4C; }
  .alert-flag.on{ color:var(--red); }
  .alert-flag.off{ color:var(--text-3); }

  .kpi-cell{ font-size:12px; color:var(--text-2); line-height:1.5; }
  .kpi-cell .kpi-badge{
    display:inline-block; font-size:9.5px; text-transform:uppercase; letter-spacing:0.04em;
    color:var(--violet); background:var(--violet-bg); border:1px solid rgba(185,140,255,0.35);
    padding:1px 7px; border-radius:5px; margin-bottom:5px; font-weight:700;
  }
  @media (max-width:820px){ .row-idx{ display:none; } }

  .tower-link{
    display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:600;
    padding:5px 10px; border-radius:7px; text-decoration:none; width:fit-content;
    background:var(--teal-dim); color:var(--teal); border:1px solid rgba(31,233,196,0.35);
    transition:background .12s ease, transform .12s ease;
  }
  .tower-link:hover{ background:rgba(31,233,196,0.22); transform:translateY(-1px); }
  .tower-link .pulse{ width:6px; height:6px; border-radius:50%; background:var(--teal); flex-shrink:0;
    box-shadow:0 0 0 0 rgba(31,233,196,0.6); animation:tower-pulse 1.8s infinite; }
  @keyframes tower-pulse{ 0%{box-shadow:0 0 0 0 rgba(31,233,196,0.55);} 70%{box-shadow:0 0 0 6px rgba(31,233,196,0);} 100%{box-shadow:0 0 0 0 rgba(31,233,196,0);} }
  .tower-link.off{
    color:var(--text-3); background:none; border:1px dashed var(--border); font-weight:500; cursor:default;
  }
  .tower-link.off:hover{ transform:none; }

  /* Full picture master table */
  .fp-controls{ display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:18px; }
  .fp-search{
    display:flex; align-items:center; gap:8px;
    background:var(--card); border:1px solid var(--border); border-radius:8px;
    padding:9px 12px; min-width:260px; flex:1; max-width:360px;
  }
  .fp-search svg{ color:var(--text-3); flex-shrink:0; }
  .fp-search input{
    border:none; outline:none; background:none; flex:1;
    font-size:12.5px; color:var(--text-1);
  }
  .fp-search input::placeholder{ color:var(--text-3); }
  .fp-select{
    background:var(--card); border:1px solid var(--border); color:var(--text-2);
    font-size:12.5px; padding:9px 12px; border-radius:8px;
  }
  .fp-count{ font-family:var(--font-mono); font-size:11px; color:var(--text-3); margin-left:auto; }

  .master-table{ background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .mt-header{
    display:grid; grid-template-columns:30px 1fr 1.3fr 80px 80px 1.3fr 140px; gap:12px; padding:11px 18px;
    background:var(--grey-bg); font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--text-3); font-weight:700; border-bottom:1px solid var(--border);
  }
  .mt-row{
    display:grid; grid-template-columns:30px 1fr 1.3fr 80px 80px 1.3fr 140px; gap:12px; padding:13px 18px;
    align-items:center; font-size:12.5px; border-bottom:1px solid var(--border-soft);
  }
  .mt-row:last-child{ border-bottom:none; }
  .mt-row:hover{ background:var(--grey-bg); cursor:pointer; }
  .mt-activity{ font-family:var(--font-mono); font-size:10.5px; color:var(--blue); font-weight:600; }
  @media (max-width:900px){
    .mt-header{ display:none; }
    .mt-row{ grid-template-columns:1fr; gap:6px; }
  }

  /* ---------- Insights dashboard ---------- */
  .kpi-tile-row{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:24px; }
  .kpi-tile{
    background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px 22px;
    display:flex; flex-direction:column; gap:10px; position:relative; overflow:hidden;
  }
  .kpi-tile .kt-icon{
    width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center;
  }
  .kpi-tile .kt-num{ font-size:30px; font-weight:800; color:var(--text-1); font-family:var(--font-mono); }
  .kpi-tile .kt-label{ font-size:11.5px; color:var(--text-3); }

  .insights-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(270px,1fr)); gap:16px; margin-bottom:20px; }
  .donut-card{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding:22px; }
  .donut-card h4{ font-size:13.5px; font-weight:800; color:var(--text-1); margin-bottom:16px; }
  .donut-body{ display:flex; align-items:center; gap:18px; }
  .donut-svg-wrap{ position:relative; flex-shrink:0; }
  .donut-center{
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .donut-center .dc-big{ font-family:var(--font-mono); font-size:22px; font-weight:800; color:var(--text-1); line-height:1; }
  .donut-center .dc-small{ font-size:9.5px; color:var(--text-3); margin-top:3px; text-align:center; }
  .donut-legend{ display:flex; flex-direction:column; gap:9px; flex:1; min-width:0; }
  .dl-item{ display:flex; align-items:center; gap:8px; font-size:11.5px; color:var(--text-2); }
  .dl-item .dl-dot{ width:9px; height:9px; border-radius:3px; flex-shrink:0; }

function cycleStatus(key, store, cycle){
  const idx = cycle.indexOf(store[key]);
  store[key] = cycle[(idx+1) % cycle.length];
  return store[key];
}

        state.expandedActivity = null;

        goto(id);

      const id = btn.dataset.activity;
      const subname = decodeURIComponent(btn.dataset.sub);
      state.expandedActivity = id;
      state.activeSubName = subname;
      goto(id, subname);
    });
  });
}

function computeSafetyNorms(it, d){
  const qtyVarDays = ((1-it.sslQty)*it.noq)/it.avg;
  const leadVarDays = (1-d.sslTime)*it.leadDays;
  const overProdDays = (1-d.msa)*15;
  const planVarDays = (1-d.planAcc)*30*d.reactionFlag;
  const safetyDays = qtyVarDays + leadVarDays + overProdDays + planVarDays;
  const minNorm = safetyDays + d.pipelineDays;
  const avgCycleDays = (it.noq/it.avg)/2;
  const maxNorm = minNorm + 2*avgCycleDays;
  return {minNorm, maxNorm, avgCycleDays};
}

function robotBreakdownHTML(r, safetyData){
  if(!r) return '';
  const safetyLookup = {};
  if(safetyData){
    safetyData.items.forEach(it=>{ safetyLookup[it.name] = computeSafetyNorms(it, safetyData.defaults); });
  }
  const rows = r.items.map(it=>{
    const matched = safetyLookup[it.name];
    const usesRealNorm = !!matched;
    const effSafetyDays = usesRealNorm ? matched.minNorm : r.safetyDays;
    const effTargetDays = usesRealNorm ? matched.maxNorm : r.targetDays;
    const safetyQty = effSafetyDays * it.avg;
    const bufferDays = it.dos - effSafetyDays;
    const targetQty = effTargetDays * it.avg;
    const orderQty = Math.max(0, targetQty - it.stock);
    const status = bufferDays < 0 ? 'BREACH' : (bufferDays <= 5 ? 'WATCH' : 'OK');
    const deliverBy = bufferDays < 0 ? 'OVERDUE — order today' : `~${Math.floor(bufferDays)}d (by ${new Date(new Date('2026-07-13').getTime()+Math.floor(bufferDays)*86400000).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'})})`;
    return {...it, safetyQty, bufferDays, orderQty, status, deliverBy, usesRealNorm, effSafetyDays, effTargetDays};
  });
  const actionItems = rows.filter(r=>r.status!=='OK');
  const tableRows = (cat) => rows.filter(x=>x.cat===cat).map(x=>`
    <tr>
      <td>${x.name}${x.usesRealNorm?' <span style="font-size:9px; color:var(--teal);" title="Using Safety Stock Robot\'s material-specific norm instead of the flat rule">●synced</span>':''}</td>
      <td class="mv">${x.stock.toLocaleString()} ${x.unit}</td>
      <td class="mv">${x.avg.toLocaleString()}/d</td>
      <td><span class="mape-status ${x.status==='OK'?'ok':'breach'}">${x.dos.toFixed(1)}d</span></td>
      <td class="mv">${x.safetyQty.toLocaleString(undefined,{maximumFractionDigits:0})} <span style="font-size:9px; color:var(--text-3);">(${x.effSafetyDays.toFixed(1)}d${x.usesRealNorm?' real':' flat'})</span></td>
      <td>${x.status==='BREACH' ? `<span class="gap-beep">BREACH</span>` : x.status==='WATCH' ? `<span style="color:var(--amber); font-weight:700;">WATCH</span>` : `<span style="color:var(--green); font-weight:700;">OK</span>`}</td>
      <td class="mv" style="${x.orderQty>0?'color:var(--red); font-weight:700;':''}">${x.orderQty>0 ? x.orderQty.toLocaleString(undefined,{maximumFractionDigits:0})+' '+x.unit : '—'}</td>
      <td style="font-size:11px;">${x.deliverBy}</td>
    </tr>`).join('');

  const emailBody = actionItems.length ? actionItems.map(x=>
    `${x.name}: order ${x.orderQty.toLocaleString(undefined,{maximumFractionDigits:0})} ${x.unit} — current stock ${x.stock.toLocaleString()} ${x.unit} (${x.dos.toFixed(1)} days cover), ${x.status==='BREACH'?'ALREADY BELOW':'approaching'} the ${x.effSafetyDays.toFixed(1)}-day${x.usesRealNorm?' (material-specific)':' (flat default)'} safety stock threshold. Deliver: ${x.deliverBy}.`
  ).join('\n\n') : 'No items currently below or approaching the safety stock threshold.';
  const mailtoHref = `mailto:procurement@akijresource.com?subject=${encodeURIComponent('Material Delivery Schedule — ACCL — '+r.asOf)}&body=${encodeURIComponent('Auto-generated by D2E Material Planning Robot. As-of: '+r.asOf+'\n\n'+emailBody)}`;

  return `
    <details class="mape-details" style="margin-top:14px;" open>
      <summary>🤖 Material Planning Robot — PM &amp; RM Delivery Schedule (ACCL) ▾</summary>
      <div style="background:var(--card); border:1px solid rgba(47,212,128,0.4); border-radius:8px; padding:10px 12px; margin-bottom:10px; font-size:12px; color:var(--text-2); line-height:1.5;">
        <strong style="color:var(--green);">✓ All 5 Raw Materials updated 15-Jul-26 — live closing stock from IBOS.</strong> Fixed by matching the ledger on the stable <code>intItemId</code> instead of item name (several materials were split across cosmetic name variants, undercounting receipts) — cross-checked against a live IBOS report you shared, exact match on Clinker (58,062.57 MT). Avg consumption now reflects real MTD Jul 1–15 usage. <strong style="color:var(--amber);">Packaging (PM) materials below are still as of 1-Apr-26</strong> — that closing-stock report only covered Raw Materials; share an equivalent one for PM and I'll refresh those too.
      </div>
      <div class="ppa-summary" style="margin-bottom:12px;">

          <div><span class="ppa-num-label">Breach</span><span class="ppa-num" style="color:var(--red);">${rows.filter(x=>x.status==='BREACH').length}</span></div>

      <div style="overflow-x:auto;"><table class="mape-table">
        <thead><tr><th>Material</th><th>Opening Stock</th><th>Avg Daily Consumption</th><th>DOS</th><th>Safety Stock Qty</th><th>Status</th><th>Suggested Order Qty (→ target)</th><th>Deliver Within</th></tr></thead>

        <div style="font-size:12px; color:var(--text-3); margin-bottom:10px; line-height:1.5;">${actionItems.length} item(s) need action. Review before sending — this drafts the email in your own mail client, it does not send automatically.</div>
        <a class="tower-link" href="${mailtoHref}" style="text-decoration:none;"><span class="pulse"></span>Open Draft in Mail Client</a>
      </div>

      <div style="background:var(--card); border:1px solid rgba(185,140,255,0.35); border-radius:10px; padding:14px 16px; margin-top:14px;">
        <div style="font-size:10.5px; letter-spacing:0.06em; text-transform:uppercase; color:#B98CFF; margin-bottom:8px;">Claude's critical review of the brief — for your decision, not auto-applied</div>

          <strong style="color:var(--text-1);">Remaining gaps worth deciding:</strong><br>

          <strong style="color:var(--text-1);">Right now, live:</strong> ${actionItems.length ? actionItems.map(x=>`<strong style="color:${x.status==='BREACH'?'var(--red)':'var(--amber)'}">${x.name}</strong> (${x.status}, deliver ${x.deliverBy.toLowerCase()})`).join(', ') : 'no items are below or approaching the safety threshold'}.

const MAPE_SBU_MAP = {
  'ACCL': 'Akij Cement Company Ltd. (ACCL)',
  'AIL': 'Akij Ispat Ltd.',
  'AAFL': 'Akij Agro Feed Ltd.',
  'AEL-Rice Plant': 'Akij Essentials Ltd.',

  'ALEL': 'Akij Light Engineering Ltd.',
  'ABSL': 'Akij Building Solutions Ltd.',
};
function mapeBreakdownHTML(mapeData){
  if(!mapeData) return '';
  const statusLabel = {breach:'Breach', ok:'Within threshold', nodata:'IBOS data fetch not complete'};
  const filterName = MAPE_SBU_MAP[state.sbu];
  const isFiltered = state.sbu !== 'All SBUs';
  const rows = isFiltered && filterName ? mapeData.filter(r=>r.sbu===filterName) : mapeData;
  const filterNote = !isFiltered ? '' :
    filterName
      ? `<div style="font-size:11px; color:var(--teal); margin-bottom:8px;">Filtered to <strong>${state.sbu}</strong> — showing 1 of ${mapeData.length} SBUs. Switch to "All SBUs" to see the rest.</div>`
      : `<div style="font-size:11px; color:var(--amber); margin-bottom:8px;">No Statistical Model data mapped for <strong>${state.sbu}</strong> yet — showing all ${mapeData.length} tracked SBUs instead.</div>`;
  const displayRows = (isFiltered && filterName) ? rows : mapeData;
  return `
    <details class="mape-details">
      <summary>📊 MAPE by SBU — live from S&amp;OP Control Tower ▾</summary>
      ${filterNote}
      <table class="mape-table">
        <thead><tr><th>SBU</th><th>Best Model</th><th>MAPE</th><th>Bias</th><th>Status</th></tr></thead>
        <tbody>
          ${displayRows.map(r=>`
            <tr>
              <td>${r.sbu}</td>
              <td>${r.model || '—'}</td>
              <td class="mv">${r.mape!==null ? r.mape.toFixed(1)+'%' : '—'}</td>
              <td class="mv">${r.bias!==null ? (r.bias>0?'+':'')+r.bias.toFixed(2)+'%' : '—'}</td>
              <td><span class="mape-status ${r.status}">${statusLabel[r.status]}</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      <div style="font-size:11px; color:var(--text-3); margin-top:8px; line-height:1.5;"><strong style="color:var(--text-2)">Selection rule changed: best model per SBU is now the one with the LOWEST MAPE</strong> (Agro Feed's best model switched from Random Forest to Gradient Boosting as a result; Ispat's Seasonal Naive stays best either way). Bias is kept as the only other parameter. <strong style="color:var(--text-2)">Why Bias and MAPE differ so much:</strong> Bias is the net signed error across all SKUs — over-forecasts on some SKUs cancel under-forecasts on others, so a model can look nearly unbiased in total while being wildly wrong SKU-by-SKU. MAPE is the average absolute % error per SKU, where nothing cancels, and it explodes on low-volume/intermittent SKUs (that's how Ispat's Random Forest shows only +19% bias but 507% MAPE). Lower MAPE is the safer selection criterion for planning. Working threshold ≤80% MAPE remains a suggested figure, not yet formally approved.</div>
    </details>
  `;
}

// ---- Embedded Control Tower (base64, self-contained — no external file needed) ----
// D2E SBU names → Control Tower SBU ids (only genuine matches mapped; others open tower default)
const TOWER_SBU_MAP = {
  'ACCL':'cement', 'AIL':'ispat', 'AAFL':'agro',
  'AEL-Rice Plant':'essentials', 'AEL-AMS & Daal':'essentials',
};
function getTowerHTML(viewId){
  const b64 = document.getElementById('tower-b64').textContent;
  let html = atob(b64);
  // Swap the tower's default starting module to the one the user clicked
  html = html.replace(/view:\s*'forecast'/, `view:'${viewId}'`);
  // Carry the currently selected SBU across where a mapping exists (e.g. EBITDA/Financial Statement opens SBU-specific)
  const towerSbu = TOWER_SBU_MAP[state.sbu];
  if(towerSbu){
    html = html.replace(/sbu:\s*'ispat'/, `sbu:'${towerSbu}'`);
  }
  return html;
}
function openTower(viewId){
  document.getElementById('tower-modal-title').textContent = TOWER_MODULES[viewId] || viewId;
  document.getElementById('tower-iframe').srcdoc = getTowerHTML(viewId);
  document.getElementById('tower-modal').classList.add('open');
}
function getMaterialsTowerHTML(){
  const b64 = document.getElementById('materials-tower-b64').textContent;
  return atob(b64);
}
function openMaterialsTower(){
  document.getElementById('tower-modal-title').textContent = 'Top Materials Purchase Intelligence';
  document.getElementById('tower-iframe').srcdoc = getMaterialsTowerHTML();
  document.getElementById('tower-modal').classList.add('open');
}
function closeTower(){
  document.getElementById('tower-modal').classList.remove('open');
  document.getElementById('tower-iframe').srcdoc = '';
}
document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape') closeTower();
});
content.addEventListener('click', (e)=>{
  const towerBtn = e.target.closest('.tower-link[data-tower-view]');
  if(towerBtn){ openTower(towerBtn.dataset.towerView); }
  const matBtn = e.target.closest('[data-materials-tower]');
  if(matBtn){ openMaterialsTower(); }
});

function donutSVG(segments, size, strokeWidth, centerBig, centerSmall){
  size = size || 128; strokeWidth = strokeWidth || 16;
  const r = (size - strokeWidth) / 2;
  const cx = size / 2, cy = size / 2;
  const circumference = 2 * Math.PI * r;
  const total = segments.reduce((s, x) => s + x.value, 0);
  let cumulative = 0;
  let circles = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${strokeWidth}"/>`;
  if (total > 0) {
    circles += segments.filter(s => s.value > 0).map(seg => {
      const frac = seg.value / total;
      const dash = frac * circumference;
      const gap = circumference - dash;
      const offset = -cumulative * circumference;
      cumulative += frac;
      return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${seg.color}" stroke-width="${strokeWidth}" stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}" transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt"/>`;
    }).join('');
  }
  return `
    <div class="donut-svg-wrap" style="width:${size}px; height:${size}px;">
      <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${circles}</svg>
      <div class="donut-center"><div class="dc-big">${centerBig}</div><div class="dc-small">${centerSmall}</div></div>
    </div>
  `;
}

function donutCard(title, segments, centerBig, centerSmall){
  const svg = donutSVG(segments, 128, 16, centerBig, centerSmall);
  const legend = segments.map(s => `
    <div class="dl-item"><span class="dl-dot" style="background:${s.color}"></span>${s.label}<span class="dl-val">${s.value}</span></div>
  `).join('');
  return `
    <div class="donut-card">
      <h4>${title}</h4>
      <div class="donut-body">
        ${svg}
        <div class="donut-legend">${legend}</div>
      </div>
    </div>
  `;
}

      <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
        <div style="font-size:16px; font-weight:700; color:var(--text-1);">🤖 Material Planning Robot</div>
        ${botActiveBadge(['ACCL'])}
      </div>
      <div style="font-size:12.5px; color:var(--text-3); margin-bottom:14px;">Opening Stock → BOM Consumption → 15-day Safety Stock check → suggested PM/RM delivery schedule. Lives under D2E-05 Material Requirement Planning.</div>
      <div data-bots-page="1">${robotBreakdownHTML(mrpActivity.robotData, mrpActivity.safetyStockRobotData)}</div>
    </div>
    <div style="background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 20px; margin-bottom:22px;">
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
        <div style="font-size:16px; font-weight:700; color:var(--text-1);">🛡️ Safety Stock Robot</div>
        ${botActiveBadge(['ACCL'])}
      </div>
      <div style="font-size:12.5px; color:var(--text-3); margin-bottom:14px;">Computes recommended Safety Stock, Minimum Norm, and Maximum Norm (days) per material from the Unbundlor formula, using real lead time and fulfillment data pulled from IBOS. Lives under D2E-05 Material Requirement Planning.</div>
      <div data-bots-page="1">${safetyStockRobotBreakdownHTML(mrpActivity.safetyStockRobotData)}</div>
    </div>
    <div style="background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 20px;">
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
        <div style="font-size:16px; font-weight:700; color:var(--text-1);">📦 Order Fulfillment BOT</div>
        ${botActiveBadge(['AEL (Essentials)'])}
        <span style="font-size:10px; padding:3px 8px; border-radius:5px; background:var(--amber-bg); color:var(--amber); border:1px solid rgba(255,176,32,0.35);">PARTIAL — root cause pending</span>
      </div>
      <div style="font-size:12.5px; color:var(--text-3); margin-bottom:14px;">Monitors every MTD Sales Order for Akij Essentials and aims to classify delivery delays as SCM vs. Sales. Executive/Exception dashboards are fully live; SCM-vs-Sales root cause classification is blocked pending a reliable warehouse stock history source (see notes in the panel). Lives under D2E-08 Distribution Requirement Planning.</div>
      <div data-bots-page="1">${orderFulfillmentBotBreakdownHTML(distActivity.orderFulfillmentBotData)}</div>
    </div>
    <div style="font-size:11px; color:var(--text-3); margin-top:16px; line-height:1.5;">Bots stay visible here regardless of the SBU selected elsewhere, since this page is meant to show every bot's status at a glance. Each bot's own page still respects the SBU slicer normally.</div>
  `;
  content.querySelectorAll('[data-bots-page] [data-sbu-gate]').forEach(el=>{ el.style.display = ''; });
  renderSidebar();
  content.scrollTop = 0;
}

// ---- Navigation ----
function goto(id, highlightSub){
  if(id === 'overview'){
    state.view = 'overview'; state.expandedActivity = null; state.activeSubName = null;
    renderOverview();
  } else if(id === 'insights'){
    state.view = 'insights'; state.expandedActivity = null; state.activeSubName = null;
    renderInsights();
  } else if(id === 'critical'){
    state.view = 'critical'; state.expandedActivity = null; state.activeSubName = null;
    renderCriticalSummary();
  } else if(id === 'bots'){
    state.view = 'bots'; state.expandedActivity = null; state.activeSubName = null;
    renderBots();
  } else if(id === 'fullpicture'){
    state.view = 'fullpicture'; state.expandedActivity = null; state.activeSubName = null;
    renderFullPicture('', 'all');
  } else if(id === 'alerts'){
    state.view = 'alerts'; state.expandedActivity = null; state.activeSubName = null;
    renderAlerts();
  } else {
    const a = DATA.find(x=>x.id===id);
    if(!a) return;
    state.view = id;
    state.expandedActivity = id;
    state.activeSubName = highlightSub || state.activeSubName || null;
    renderActivity(a, highlightSub);
  }
  renderSidebar();
  content.scrollTop = 0;
  window.scrollTo({top:0, behavior:'smooth'});
}

// ---- SBU selector (event-delegated: bound once, works no matter how many times the panel re-renders) ----
const SBUS = ['All SBUs','ACCL','AIL','ARMCL','ABSL','AEL-Rice Plant','AEL-AMS & Daal','ALEL','AAFL','NABAYAN','AKIJ Commodities'];
state.sbu = 'All SBUs';

function bindBuSelector(){
  const buInput = document.getElementById('bu-input');
  if(buInput) buInput.value = state.sbu;
}

function renderBuResults(filterText){
  const buResults = document.getElementById('bu-results');
  if(!buResults) return;
  const q = (filterText||'').trim().toLowerCase();
  const matches = SBUS.filter(s => s.toLowerCase().includes(q));
  buResults.innerHTML = matches.length ? matches.map(s=>`
    <div class="sr-item" data-sbu="${encodeURIComponent(s)}">
      <div class="sr-name">${s}</div>
    </div>
  `).join('') : `<div class="sr-empty">No matching SBU</div>`;
  buResults.classList.remove('hidden');
}

// Delegated listeners attached once to the persistent #content node — survive every innerHTML re-render
content.addEventListener('focusin', (e)=>{
  if(e.target && e.target.id === 'bu-input'){ renderBuResults(''); }
});
content.addEventListener('input', (e)=>{
  if(e.target && e.target.id === 'bu-input'){ renderBuResults(e.target.value); }
  if(e.target && e.target.id === 'fp-search-input'){
    const activitySelect = document.getElementById('fp-activity');
    renderFullPicture(e.target.value, activitySelect ? activitySelect.value : 'all');
  }
});
content.addEventListener('change', (e)=>{
  if(e.target && e.target.id === 'fp-activity'){
    const searchBox = document.getElementById('fp-search-input');
    renderFullPicture(searchBox ? searchBox.value : '', e.target.value);
  }
});
content.addEventListener('click', (e)=>{
  const sbuItem = e.target.closest('.sr-item[data-sbu]');
  if(sbuItem){
    const sbu = decodeURIComponent(sbuItem.dataset.sbu);
    state.sbu = sbu;
    const buInput = document.getElementById('bu-input');
    if(buInput) buInput.value = sbu;
    const badge = document.getElementById('sbu-badge');
    if(badge) badge.textContent = sbu;
    const buResults = document.getElementById('bu-results');
    if(buResults) buResults.classList.add('hidden');
    document.querySelectorAll('[data-sbu-gate="accl"]').forEach(el=>{
      el.style.display = sbuGateVisible() ? '' : 'none';
    });
    document.querySelectorAll('[data-sbu-gate="notaccl"]').forEach(el=>{
      el.style.display = sbuGateVisible() ? 'none' : '';
    });
    document.querySelectorAll('[data-sbu-gate="essentials"]').forEach(el=>{
      el.style.display = sbuGateVisibleEssentials() ? '' : 'none';
    });
    const noticeName = document.getElementById('sbu-notice-name');
    if(noticeName) noticeName.textContent = sbu;
    return;
  }
  if(e.target.closest('.tower-link')) return;
  const sliceBtn = e.target.closest('.ppa-slice-btn');
  if(sliceBtn){
    const wrap = sliceBtn.closest('.mape-details');
    wrap.querySelectorAll('.ppa-slice-btn').forEach(b=>b.classList.toggle('active', b===sliceBtn));
    wrap.querySelectorAll('[data-ppa-summary]').forEach(el=>{
      el.style.display = (el.dataset.ppaSummary === sliceBtn.dataset.ppaSlice) ? '' : 'none';
    });
    return;
  }
  const capBtn = e.target.closest('.cap-slice-btn');
  if(capBtn){
    const wrap = capBtn.closest('.mape-details');
    wrap.querySelectorAll('.cap-slice-btn').forEach(b=>b.classList.toggle('active', b===capBtn));
    wrap.querySelectorAll('[data-cap-summary]').forEach(el=>{
      el.style.display = (el.dataset.capSummary === capBtn.dataset.capSlice) ? '' : 'none';
    });
    return;
  }
  const stockBtn = e.target.closest('.stock-slice-btn');
  if(stockBtn){
    const wrap = stockBtn.closest('.mape-details');
    wrap.querySelectorAll('.stock-slice-btn').forEach(b=>b.classList.toggle('active', b===stockBtn));
    wrap.querySelectorAll('[data-stock-summary]').forEach(el=>{
      el.style.display = (el.dataset.stockSummary === stockBtn.dataset.stockSlice) ? '' : 'none';
    });
    return;
  }
  const mrpBtn = e.target.closest('.mrp-slice-btn');
  if(mrpBtn){
    const wrap = mrpBtn.closest('.mape-details');
    wrap.querySelectorAll('.mrp-slice-btn').forEach(b=>b.classList.toggle('active', b===mrpBtn));
    wrap.querySelectorAll('[data-mrp-summary]').forEach(el=>{
      el.style.display = (el.dataset.mrpSummary === mrpBtn.dataset.mrpSlice) ? '' : 'none';
    });
    return;
  }
  if(e.target.closest('.mape-details')) return;
  const mtRow = e.target.closest('.mt-row[data-jump]');
  if(mtRow){
    goto(mtRow.dataset.jump, decodeURIComponent(mtRow.dataset.subname));
  }
});
document.addEventListener('click', (e)=>{
  if(!e.target.closest('.bu-select-box')){
    const buResults = document.getElementById('bu-results');
    if(buResults) buResults.classList.add('hidden');
  }
});

// ---- Clock ----
function tick(){
  const now = new Date();
  document.getElementById('clock-pill').textContent = 'Dhaka ' + now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', hour12:false});
}
tick();
setInterval(tick, 30000);

// ---- Init ----
renderSidebar();
renderOverview();
</script>
